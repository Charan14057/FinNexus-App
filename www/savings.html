<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus | Savings Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { background-color: #0D0D0D; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
        .emerald-text-glow { color: #3deb91; text-shadow: 0 0 15px rgba(61, 235, 145, 0.4); }
    </style>
</head>
<body class="p-6 pb-32">

    <header class="flex items-center gap-4 mb-8">
        <button onclick="window.location.href='home.html'" class="size-10 rounded-full bg-white/5 flex items-center justify-center">
            <span class="material-symbols-outlined text-white">arrow_back</span>
        </button>
        <h1 class="text-xl font-bold">Savings & Goals</h1>
    </header>

    <section class="mb-10">
        <div class="glass-card rounded-[32px] p-8 text-center relative overflow-hidden">
            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500 mb-2">Total Amount Protected</p>
            <h2 id="total-saved-cumulative" class="text-5xl font-black emerald-text-glow">₹0.00</h2>
            <div class="mt-6 pt-6 border-t border-white/5 flex justify-center items-center gap-2">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Emergency Cover</span>
                <span class="text-cyan-400 font-bold">₹1,500</span>
            </div>
        </div>
    </section>

    <section class="mb-10">
        <h2 class="text-sm font-black uppercase tracking-widest text-slate-500 mb-4 ml-2">Category Performance</h2>
        <div class="grid grid-cols-2 gap-4" id="category-savings-grid">
            </div>
    </section>

    <section class="mb-10">
        <div class="flex justify-between items-end mb-4 px-2">
            <h2 class="text-sm font-black uppercase tracking-widest text-slate-500">Goal Architect</h2>
            <span class="text-[10px] text-primary font-bold uppercase">New Goal</span>
        </div>
        <div class="glass-card rounded-[32px] p-6 space-y-6">
            <div class="flex items-center gap-4">
                <div class="size-12 rounded-2xl bg-primary/10 flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">target</span>
                </div>
                <div>
                    <h4 class="font-bold">Financial Milestone</h4>
                    <p class="text-[10px] text-slate-500 uppercase tracking-tighter">Design your next peak</p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/40 rounded-2xl p-4">
                    <p class="text-[9px] font-black text-slate-600 uppercase mb-1">Saved</p>
                    <p class="text-lg font-bold text-cyan-400">₹0.00</p>
                </div>
                <div class="bg-black/40 rounded-2xl p-4">
                    <p class="text-[9px] font-black text-slate-600 uppercase mb-1">Target</p>
                    <p class="text-lg font-bold text-white">₹2,00,000</p>
                </div>
            </div>
            <button onclick="simulateMonthEnd()" class="w-full py-3 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-black uppercase tracking-widest text-slate-400 active:bg-primary/20 transition-all">
                Simulate Monthly Surplus Transfer
            </button>
        </div>
    </section>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] glass-card rounded-full p-2 flex justify-around items-center z-50">
        <a href="history.html" class="p-3 text-slate-500"><span class="material-symbols-outlined">history</span></a>
        <a href="home.html" class="p-3 text-slate-500"><span class="material-symbols-outlined">home</span></a>
        <a href="savings.html" class="p-3 text-primary"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">savings</span></a>
    </nav>

<script>
    function loadSavings() {
        const walletData = JSON.parse(localStorage.getItem('finnexus_wallet_data')) || { categories: [] };
        const grid = document.getElementById('category-savings-grid');
        grid.innerHTML = '';
        
        let totalSurplus = 0;

        walletData.categories.forEach(cat => {
            // Logic: Saved this month = Limit - Spent
            const spent = parseFloat(localStorage.getItem(`budget_${cat.name.toLowerCase()}_spent`) || 0);
            const savedThisMonth = Math.max(0, cat.limit - spent);
            
            // Cumulative Savings (From app start)
            const cumulative = parseFloat(localStorage.getItem(`budget_${cat.name.toLowerCase()}_cumulative_saved`) || 0);
            totalSurplus += cumulative + savedThisMonth;

            grid.innerHTML += `
                <div class="glass-card rounded-3xl p-5 space-y-3">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm text-cyan-400">${cat.icon || 'star'}</span>
                        <span class="text-xs font-bold text-slate-300 uppercase">${cat.name}</span>
                    </div>
                    <div>
                        <p class="text-lg font-black text-primary">₹${(cumulative + savedThisMonth).toLocaleString('en-IN')}</p>
                        <p class="text-[8px] text-slate-500 uppercase font-black tracking-tighter">Total Accumulated</p>
                    </div>
                </div>`;
        });

        document.getElementById('total-saved-cumulative').textContent = `₹${totalSurplus.toLocaleString('en-IN')}`;
    }

    // This simulates the logic: "Monthly budget resets, and leftovers move to the Vault"
    function simulateMonthEnd() {
        if(!confirm("End of month reached. Sweep all budget surpluses into the Savings Vault?")) return;

        const walletData = JSON.parse(localStorage.getItem('finnexus_wallet_data')) || { categories: [] };
        
        walletData.categories.forEach(cat => {
            const spent = parseFloat(localStorage.getItem(`budget_${cat.name.toLowerCase()}_spent`) || 0);
            const savedThisMonth = Math.max(0, cat.limit - spent);
            
            // Move to cumulative vault
            const currentVault = parseFloat(localStorage.getItem(`budget_${cat.name.toLowerCase()}_cumulative_saved`) || 0);
            localStorage.setItem(`budget_${cat.name.toLowerCase()}_cumulative_saved`, (currentVault + savedThisMonth).toFixed(2));
            
            // Reset this month's spending to zero
            localStorage.setItem(`budget_${cat.name.toLowerCase()}_spent`, "0");
        });

        alert("Month Reset. All remaining budget funds have been secured in Savings.");
        loadSavings();
    }

    document.addEventListener('DOMContentLoaded', loadSavings);
</script>
</body>
</html>
