<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus - Safety Logs</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#0e0e0e",
              "primary": "#86fea7",
              "error": "#ff716c",
              "surface-container-low": "#131313",
              "surface-container-high": "#201f1f",
            },
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .aurora-bg {
            background: radial-gradient(circle at 0% 0%, rgba(134, 254, 167, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, rgba(0, 251, 251, 0.1) 0%, transparent 40%);
        }
        .glass-pill { background: rgba(38, 38, 38, 0.4); backdrop-filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-surface text-white font-body min-h-screen aurora-bg pb-32">

<header class="fixed top-0 w-full z-50 bg-stone-950/40 backdrop-blur-xl flex items-center justify-between px-6 py-4">
    <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-primary">history</span>
        <h1 class="font-['Inter_Tight'] text-xl font-bold text-primary">History</h1>
    </div>
</header>

<main class="pt-24 px-6 max-w-lg mx-auto">
    <div class="mb-8">
        <p class="text-slate-500 text-sm tracking-wide">Your wallet firewall is active and monitoring.</p>
    </div>

    <div class="flex gap-3 overflow-x-auto pb-6 no-scrollbar" id="filter-bar">
        <button onclick="filterHistory('All', this)" class="filter-pill glass-pill px-6 py-2.5 rounded-full text-primary border border-primary/30 text-sm font-bold shadow-[0_0_15px_rgba(134,254,167,0.2)] whitespace-nowrap">All</button>
        <button onclick="filterHistory('Food', this)" class="filter-pill glass-pill px-6 py-2.5 rounded-full text-slate-500 border border-white/10 text-sm font-medium whitespace-nowrap">Food</button>
        <button onclick="filterHistory('Fuel', this)" class="filter-pill glass-pill px-6 py-2.5 rounded-full text-slate-500 border border-white/10 text-sm font-medium whitespace-nowrap">Fuel</button>
        <button onclick="filterHistory('Shopping', this)" class="filter-pill glass-pill px-6 py-2.5 rounded-full text-slate-500 border border-white/10 text-sm font-medium whitespace-nowrap">Shopping</button>
        <button onclick="filterHistory('Blocked', this)" class="filter-pill glass-pill px-6 py-2.5 rounded-full text-slate-500 border border-white/10 text-sm font-medium whitespace-nowrap">Blocked</button>
    </div>

    <div class="space-y-4" id="log-container">
        </div>
</main>

<nav class="fixed bottom-6 w-full z-50 flex justify-center px-4">
    <div class="bg-[#131313]/80 backdrop-blur-2xl w-full max-w-xs rounded-2xl border border-white/5 flex justify-around items-center py-2 px-2 shadow-2xl">
        <a class="p-3 text-stone-500" href="home.html"><span class="material-symbols-outlined">home</span></a>
        <a class="bg-primary/20 text-primary rounded-xl p-3 shadow-[0_0_15px_rgba(134,254,167,0.4)]" href="history.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">history</span>
        </a>
        <a class="p-3 text-stone-500" href="savings.html"><span class="material-symbols-outlined">savings</span></a>
    </div>
</nav>

<script>
    // ICON MAPPING
    const icons = {
        'Food': 'restaurant',
        'Fuel': 'local_gas_station',
        'Shopping': 'shopping_bag',
        'Travel': 'commute',
        'Rent': 'home_work'
    };

    function renderHistory(filter = 'All') {
        const history = JSON.parse(localStorage.getItem('finnexus_history') || '[]');
        const container = document.getElementById('log-container');
        container.innerHTML = '';

        const filtered = filter === 'All' ? history : history.filter(t => t.category === filter || (filter === 'Blocked' && !t.isSafe));

        if (filtered.length === 0) {
            container.innerHTML = `<p class="text-center text-slate-600 mt-20 text-sm">No activity recorded for ${filter}.</p>`;
            return;
        }

        filtered.forEach(txn => {
            if (txn.isSafe) {
                // NORMAL TRANSACTION UI
                const item = `
                <div class="bg-surface-container-low p-4 rounded-xl flex items-center justify-between transition-all active:scale-95">
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <div class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center border border-white/5">
                                <span class="material-symbols-outlined text-primary text-3xl">${icons[txn.category] || 'payments'}</span>
                            </div>
                            <div class="absolute -bottom-1 -right-1 bg-surface-container-high rounded-full p-1 border border-primary/20">
                                <span class="material-symbols-outlined text-primary text-[14px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
                            </div>
                        </div>
                        <div>
                            <h4 class="font-bold text-white">${txn.merchant}</h4>
                            <p class="text-slate-500 text-[10px] mt-0.5 uppercase tracking-widest">${txn.date}, ${txn.time}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-white font-bold text-lg">₹${txn.amount}</span>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', item);
            } else {
                // BLOCKED TRANSACTION UI (RED)
                const item = `
                <div class="bg-red-500/10 p-4 rounded-xl flex items-center justify-between border border-red-500/20 shadow-lg">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full bg-red-500/20 flex items-center justify-center border border-red-500/30">
                            <span class="material-symbols-outlined text-red-400 text-3xl" style="font-variation-settings: 'FILL' 1;">warning</span>
                        </div>
                        <div>
                            <h4 class="font-bold text-red-400">SCAM BLOCKED</h4>
                            <p class="text-slate-500 text-[10px] mt-0.5 uppercase tracking-widest">${txn.date}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-slate-500 line-through block text-sm">₹${txn.amount}</span>
                        <span class="text-primary text-[10px] uppercase font-black tracking-widest">SAVED</span>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', item);
            }
        });
    }

    function filterHistory(cat, btn) {
        // Update UI Pills
        document.querySelectorAll('.filter-pill').forEach(b => {
            b.classList.remove('text-primary', 'border-primary/30', 'shadow-[0_0_15px_rgba(134,254,167,0.2)]', 'font-bold');
            b.classList.add('text-slate-500', 'border-white/10', 'font-medium');
        });
        btn.classList.replace('text-slate-500', 'text-primary');
        btn.classList.replace('border-white/10', 'border-primary/30');
        btn.classList.add('font-bold', 'shadow-[0_0_15px_rgba(134,254,167,0.2)]');

        renderHistory(cat);
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => renderHistory('All'));
</script>
</body>
</html>
