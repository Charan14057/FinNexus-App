<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus | Entry Protocol</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Inter Tight', sans-serif;
            background-color: #0D0D0D;
            min-height: 100vh;
            overflow: hidden;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* IMPROVED: Live Animated Neural Background */
        .mesh-bg {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at var(--x, 50%) var(--y, -10%), rgba(61, 235, 145, 0.15) 0%, transparent 50%),
                radial-gradient(circle at var(--nx, 0%) var(--ny, 100%), rgba(6, 182, 212, 0.1) 0%, transparent 40%);
            z-index: -1;
            transition: background 0.5s ease;
            animation: neural-pulse 8s infinite alternate ease-in-out;
        }

        @keyframes neural-pulse {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        .animation-stage {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .letter {
            position: absolute;
            font-weight: 900;
            font-size: 60px;
            opacity: 0;
            z-index: 60;
            pointer-events: none;
        }
        
        .f-glide {
            color: #06B6D4;
            animation: glide-f 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .n-glide {
            color: #fff;
            animation: glide-n 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes glide-f {
            0% { transform: translate(300px, -300px) rotate(45deg); opacity: 0; }
            80% { transform: translate(0, 0) rotate(0deg); opacity: 1; filter: blur(0px); }
            100% { transform: scale(0); opacity: 0; filter: blur(20px); }
        }
        @keyframes glide-n {
            0% { transform: translate(-300px, 300px) rotate(-45deg); opacity: 0; }
            80% { transform: translate(0, 0) rotate(0deg); opacity: 1; filter: blur(0px); }
            100% { transform: scale(0); opacity: 0; filter: blur(20px); }
        }

        .logo-shield {
            opacity: 0;
            transform: scale(0.5);
            animation: reveal-shield 0.8s 1.1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            z-index: 50;
        }
        @keyframes reveal-shield {
            to { opacity: 1; transform: scale(1); }
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            transition: all 0.4s ease;
        }
        .glass-input:focus-within {
            background: rgba(255, 255, 255, 0.05);
            border-color: #3deb91;
            box-shadow: 0 0 30px rgba(61, 235, 145, 0.1);
        }

        .btn-action {
            background: linear-gradient(180deg, #3deb91 0%, #1a9e66 100%);
            box-shadow: 0 10px 25px -5px rgba(61, 235, 145, 0.3);
            transition: all 0.3s ease;
        }
        .btn-action:active { transform: scale(0.96); opacity: 0.9; }

        .fade-content { animation: fadeIn 0.8s 1.6s ease forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="py-16 px-8">

    <div class="mesh-bg" id="bg"></div>

    <div class="animation-stage">
        <div class="letter f-glide">F</div>
        <div class="letter n-glide">N</div>

        <div class="logo-shield w-28 h-28 rounded-full flex items-center justify-center relative border border-white/10 bg-white/5 backdrop-blur-xl">
            <svg height="56" viewBox="0 0 80 80" width="56" xmlns="http://www.w3.org/2000/svg">
                <path d="M25 55V25H45C50 25 55 29 55 34C55 39 51 43 46 43H34" fill="none" stroke="#06B6D4" stroke-width="5" stroke-linecap="round"></path>
                <path d="M35 25V55L55 25V55" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"></path>
            </svg>
            <div class="absolute inset-0 rounded-full border border-cyan-400/20 animate-ping"></div>
        </div>
    </div>

    <header class="w-full flex flex-col items-center mb-8 fade-content">
        <div class="text-center">
            <h1 class="text-4xl font-black tracking-tighter text-white uppercase italic">FinNexus</h1>
            <p class="text-primary text-[9px] font-black uppercase tracking-[0.4em] opacity-70 mt-1">Firewall Identity Protocol</p>
        </div>
    </header>

    <main class="w-full max-w-sm flex flex-col gap-6 fade-content">
        <div class="space-y-3">
            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Secure Access Node</label>
            <div class="glass-input flex items-center rounded-2xl px-6 h-16 group">
                <span class="text-primary font-black mr-4 text-lg opacity-40 group-focus-within:opacity-100 transition-opacity">+91</span>
                <input id="mobile" maxlength="10" class="bg-transparent w-full text-xl font-black text-white outline-none placeholder:text-slate-800 tracking-widest" placeholder="00000 00000" type="tel"/>
            </div>
        </div>
        
        <button id="continue-btn" class="btn-action w-full h-16 rounded-2xl text-black font-black text-sm tracking-widest uppercase">
          Initialize Access →
        </button>
    </main>

    <footer class="w-full max-w-sm text-center mt-12 fade-content">
        <button id="join-btn" class="w-full h-14 rounded-2xl border border-white/5 bg-white/5 font-black text-[10px] uppercase tracking-[0.3em] text-slate-500 hover:text-white transition-colors">
            New Deployment? Join Now
        </button>
        <p class="text-slate-700 text-[8px] mt-6 font-black uppercase tracking-[0.4em]">Proprietary Multi-Layer Encryption</p>
    </footer>

    <script>
        const mobileInput = document.getElementById('mobile');
        const bg = document.getElementById('bg');
        
        // 1. Subtle Parallax effect for commercial feel
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            bg.style.setProperty('--x', `${x}%`);
            bg.style.setProperty('--y', `${y}%`);
            bg.style.setProperty('--nx', `${100 - x}%`);
            bg.style.setProperty('--ny', `${100 - y}%`);
        });

        mobileInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 10) val = val.slice(0, 10);
            e.target.value = val;
        });

        document.getElementById('continue-btn').addEventListener('click', () => {
            const raw = mobileInput.value;
            if (raw.length === 10) {
                // LOCK THE SESSION BY MOBILE NUMBER
                localStorage.setItem('fn_user', raw); 
                
                // DATA ISOLATION: Check if THIS specific user profile exists
                const existingProfile = localStorage.getItem(`profile_${raw}`);
                
                if (existingProfile) {
                    window.location.href = 'home.html';
                } else {
                    window.location.href = 'pages/onboarding/step-1.html';
                }
            } else { 
                mobileInput.parentElement.classList.add('border-red-500/50');
                setTimeout(() => mobileInput.parentElement.classList.remove('border-red-500/50'), 600);
            }
        });

        document.getElementById('join-btn').addEventListener('click', () => {
            // HARD RESET SESSION FOR NEW USER
            localStorage.removeItem('fn_user'); 
            window.location.href = 'pages/onboarding/step-1.html';
        });
    </script>
</body>
</html>
