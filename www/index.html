<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus | Entry Protocol</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Inter Tight', sans-serif;
            background-color: #0D0D0D;
            min-height: 100vh;
            overflow: hidden;
            color: white;
        }

        .mesh-bg {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 50% -10%, rgba(61, 235, 145, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
            z-index: -1;
        }

        .letter {
            position: absolute;
            font-weight: 900;
            font-size: 40px;
            opacity: 0;
            z-index: 50;
        }
        
        .f-glide {
            top: 10%; right: 10%; color: #06B6D4;
            animation: glide-f 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .n-glide {
            bottom: 10%; right: 10%; color: #fff;
            animation: glide-n 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes glide-f {
            0% { transform: translate(100px, -100px); opacity: 0; }
            100% { transform: translate(-42vw, 38vh); opacity: 1; filter: blur(10px); }
        }
        @keyframes glide-n {
            0% { transform: translate(100px, 100px); opacity: 0; }
            100% { transform: translate(-42vw, -38vh); opacity: 1; filter: blur(10px); }
        }

        .logo-shield {
            opacity: 0;
            transform: scale(0.8);
            animation: reveal-shield 0.6s 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes reveal-shield {
            to { opacity: 1; transform: scale(1); }
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            transition: all 0.4s ease;
        }
        .glass-input:focus-within {
            background: rgba(255, 255, 255, 0.05);
            border-color: #3deb91;
            box-shadow: 0 0 30px rgba(61, 235, 145, 0.1);
        }

        .btn-action {
            background: linear-gradient(180deg, #3deb91 0%, #1a9e66 100%);
            box-shadow: 0 10px 25px -5px rgba(61, 235, 145, 0.3);
            transition: all 0.3s ease;
        }
        .btn-action:active { transform: scale(0.96); opacity: 0.9; }

        .fade-content { animation: fadeIn 0.8s 1.3s ease forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col items-center justify-between py-16 px-8">

    <div class="mesh-bg"></div>

    <div class="letter f-glide">F</div>
    <div class="letter n-glide">N</div>

    <header class="w-full flex flex-col items-center">
        <div class="logo-shield w-28 h-28 rounded-full flex items-center justify-center relative border border-white/10 bg-white/5 backdrop-blur-xl mb-8">
            <svg height="56" viewBox="0 0 80 80" width="56" xmlns="http://www.w3.org/2000/svg">
                <path d="M25 55V25H45C50 25 55 29 55 34C55 39 51 43 46 43H34" fill="none" stroke="#06B6D4" stroke-width="5" stroke-linecap="round"></path>
                <path d="M35 25V55L55 25V55" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"></path>
            </svg>
            <div class="absolute inset-0 rounded-full border border-cyan-400/20 animate-ping"></div>
        </div>
        
        <div class="text-center fade-content">
            <h1 class="text-3xl font-black tracking-tight text-white">FinNexus</h1>
            <p class="text-primary text-[9px] uppercase tracking-[0.4em] font-bold opacity-70 mt-1">Firewall Intelligence</p>
        </div>
    </header>

    <main class="w-full max-w-sm flex flex-col gap-6 fade-content">
        <div class="space-y-3">
            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Enter your mobile number</label>
            <div class="glass-input flex items-center rounded-2xl px-5 h-16 group">
                <span class="text-primary font-bold mr-4 text-lg opacity-50 group-focus-within:opacity-100 transition-opacity">+91</span>
                <input id="mobile" maxlength="10" class="bg-transparent w-full text-xl font-bold text-white outline-none placeholder:text-slate-700" placeholder="00000 00000" type="tel"/>
            </div>
        </div>
        
        <button id="continue-btn" class="btn-action w-full h-16 rounded-2xl text-black font-black text-sm tracking-widest uppercase">
          Initialize Access →
        </button>
    </main>

    <footer class="w-full max-w-sm text-center fade-content">
        <button id="join-btn" class="w-full h-14 rounded-2xl border border-white/5 bg-white/5 font-bold text-[10px] uppercase tracking-[0.2em] text-slate-400 hover:text-white transition-colors">
            New To Firewall ? Join Now
        </button>
        <p class="text-slate-600 text-[9px] mt-4 font-bold uppercase tracking-widest">Secured by Multi-Layer Protocol</p>
    </footer>

    <script>
        const mobileInput = document.getElementById('mobile');
        
        mobileInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 10) val = val.slice(0, 10);
            e.target.value = val;
        });

        document.getElementById('continue-btn').addEventListener('click', () => {
            const raw = mobileInput.value;
            if (raw.length === 10) {
                localStorage.setItem('finnexus_temp_mobile', raw);
                const existing = localStorage.getItem(`finnexus_profile_${raw}`);
                window.location.href = existing ? 'home.html' : 'pages/onboarding/step-1.html';
            } else { 
                mobileInput.parentElement.classList.add('border-red-500/50');
                setTimeout(() => mobileInput.parentElement.classList.remove('border-red-500/50'), 600);
            }
        });

        // THE FIX: Clear temp data so Step-1 starts fresh
        document.getElementById('join-btn').addEventListener('click', () => {
            localStorage.removeItem('finnexus_temp_mobile'); 
            window.location.href = 'pages/onboarding/step-1.html';
        });
    </script>
</body>
</html>
