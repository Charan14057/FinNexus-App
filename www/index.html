<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus - Swift-Entry</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter Tight', sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #0D0D0D;
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(6, 182, 212, 0.15), transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.08), transparent 40%);
            min-height: 100vh;
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .btn-emerald-gloss {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            box-shadow: 0 12px 30px -10px rgba(16, 185, 129, 0.5);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-between py-12 px-6 text-white overflow-hidden">
    <header class="w-full flex flex-col items-center mt-10">
        <div class="w-32 h-32 rounded-full flex items-center justify-center mb-8 relative border border-white/10 bg-white/5 backdrop-blur-xl">
            <svg height="72" viewBox="0 0 80 80" width="72" xmlns="http://www.w3.org/2000/svg">
                <path d="M25 55V25H45C50 25 55 29 55 34C55 39 51 43 46 43H34" fill="none" stroke="#06B6D4" stroke-width="4.5" stroke-linecap="round"></path>
                <path d="M35 25V55L55 25V55" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round"></path>
            </svg>
        </div>
        <div class="text-center">
            <h1 class="text-4xl font-bold tracking-tight text-white mb-1">FinNexus</h1>
            <p class="text-cyan-400 text-[10px] uppercase tracking-[0.3em] font-semibold opacity-90">The firewall of the wallet</p>
        </div>
    </header>

    <main class="w-full max-w-sm flex flex-col gap-6">
        <div class="space-y-3">
            <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-[0.15em] ml-1">Mobile Number</label>
            <input id="mobile" class="glass-input w-full h-16 px-6 rounded-2xl text-xl text-white" placeholder="+91 00000 00000" type="tel"/>
        </div>
        <button id="continue-btn" class="btn-emerald-gloss w-full h-16 rounded-2xl text-white font-bold text-lg">Continue →</button>
    </main>

    <footer class="w-full max-w-sm text-center pb-6">
        <button id="join-btn" class="w-full h-16 rounded-2xl border border-white/10 bg-white/5 font-bold mb-4">Join the Firewall</button>
        <p class="text-gray-500 text-sm">New here? Get started in seconds.</p>
    </footer>

    <script>
        const mobileInput = document.getElementById('mobile');
        mobileInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 10) val = val.slice(0, 10);
            e.target.value = val.length > 0 ? '+91 ' + val : '';
        });

        document.getElementById('continue-btn').addEventListener('click', () => {
            const raw = mobileInput.value.replace(/\D/g, '').replace('91', '');
            if (raw.length === 10) {
                localStorage.setItem('finnexus_temp_mobile', raw);
                const existing = localStorage.getItem(`finnexus_profile_${raw}`);
                window.location.href = existing ? 'home.html' : 'pages/onboarding/step-1.html';
            } else { alert("Enter 10 digits"); }
        });

        document.getElementById('join-btn').addEventListener('click', () => {
            window.location.href = 'pages/onboarding/step-1.html';
        });
    </script>
</body>
</html>
