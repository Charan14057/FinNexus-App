<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus | Command Center</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3deb91",
                        "background-dark": "#0D0D0D",
                        "obsidian": "#0D0D0D",
                        "teal-accent": "#008080",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        .aurora-bg {
            background: 
                radial-gradient(circle at var(--x, 80%) var(--y, 20%), rgba(61, 235, 145, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(0, 128, 128, 0.15) 0%, transparent 40%),
                linear-gradient(180deg, #0D0D0D 0%, #050505 100%);
            position: relative;
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glossy-sphere {
            background: radial-gradient(circle at 30% 30%, #3deb91 0%, #008080 100%);
            box-shadow: 
                0 25px 50px -12px rgba(61, 235, 145, 0.4),
                inset -10px -10px 25px rgba(0,0,0,0.4),
                inset 8px 8px 20px rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glossy-sphere:active { transform: scale(0.9) rotate(5deg); }

        .scan-ring { border: 1.5px solid rgba(61, 235, 145, 0.2); border-radius: 50%; pointer-events: none; }

        .nav-item-active {
            color: #3deb91 !important;
            filter: drop-shadow(0 0 8px rgba(61, 235, 145, 0.5));
        }
        .nav-item-active::after {
            content: ""; position: absolute; bottom: -10px; width: 4px; height: 4px;
            background: #3deb91; border-radius: 50%; box-shadow: 0 0 10px #3deb91;
        }

        .typing-effect {
            overflow: hidden;
            border-right: 2px solid #3deb91;
            white-space: nowrap;
            letter-spacing: -0.02em;
            animation: typing 2s steps(20, end), blink-caret 0.75s step-end infinite;
        }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #3deb91 } }

        .nav-dock { background: rgba(13, 13, 13, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="aurora-bg font-display text-slate-100 min-h-screen flex flex-col overflow-x-hidden" id="main-body">

<header class="flex items-center justify-between px-8 pt-10 pb-4 relative z-10">
    <div class="flex flex-col">
        <span class="text-[10px] font-black text-primary tracking-[0.3em] uppercase opacity-60 italic">Protocol Verified</span>
        <h1 class="text-3xl font-black tracking-tighter text-white mt-1 flex items-center gap-2">
            Hi, <span id="display-name" class="typing-effect">User</span>
        </h1>
    </div>
    <div class="relative cursor-pointer group" onclick="window.location.href='profile.html'">
        <div class="size-12 rounded-xl border border-white/10 flex items-center justify-center bg-white/5 transition-all group-hover:border-primary/50">
            <span class="material-symbols-outlined text-2xl text-slate-400">person_filled</span>
        </div>
        <div class="absolute -top-1 -right-1 size-3 bg-primary border-2 border-obsidian rounded-full animate-pulse"></div>
    </div>
</header>

<main class="flex-1 px-6 space-y-4 relative z-10 flex flex-col">
    
    <div onclick="window.location.href='wallet.html'" class="glass-card rounded-[32px] p-6 relative overflow-hidden group active:scale-[0.98]">
        <div class="absolute top-0 right-0 p-8 opacity-5">
            <span class="material-symbols-outlined text-7xl">database</span>
        </div>
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-2 bg-white/5 px-3 py-1 rounded-full border border-white/5">
                <span class="material-symbols-outlined text-[12px] text-primary">security</span>
                <span class="text-[8px] font-black uppercase tracking-widest text-slate-400">Vault</span>
            </div>
            <button onclick="togglePrivacy(event)" class="size-8 rounded-full bg-white/5 flex items-center justify-center">
                <span id="eye-icon" class="material-symbols-outlined text-lg text-slate-500">visibility_off</span>
            </button>
        </div>
        <div class="flex flex-col">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Available</p>
            <h2 id="display-balance" class="text-4xl font-black text-white tracking-tighter blur-md transition-all duration-500">₹84,500.00</h2>
        </div>
    </div>

    <div class="flex flex-col items-center justify-center py-4 relative">
        <div class="scan-ring absolute size-48 animate-[spin_8s_linear_infinite] opacity-40"></div>
        <div class="scan-ring absolute size-56 animate-[spin_12s_linear_infinite_reverse] opacity-20"></div>
        <div class="scan-ring absolute size-64 animate-pulse opacity-10"></div>
        
        <button onclick="window.location.href='pay.html'" class="glossy-sphere size-44 rounded-full flex flex-col items-center justify-center gap-1 group relative z-10">
            <div class="absolute inset-0 rounded-full bg-white/10 blur-xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <span class="material-symbols-outlined text-white text-5xl font-light">qr_code_scanner</span>
            <span class="text-white font-black text-[9px] tracking-[0.4em] mt-2 uppercase">Pay Now</span>
            <div class="absolute top-3 left-5 size-10 bg-white/20 blur-md rounded-full pointer-events-none"></div>
        </button>
        
        <p class="mt-8 text-primary/60 text-[8px] font-black uppercase tracking-[0.5em]">Protocol Active</p>
    </div>

    <div class="grid grid-cols-2 gap-3 pb-32">
        <div onclick="window.location.href='history.html'" class="glass-card rounded-[24px] p-4 flex items-center gap-3 active:scale-95 transition-all cursor-pointer">
            <div class="size-10 flex-shrink-0 rounded-xl bg-primary/10 flex items-center justify-center text-primary">
                <span class="material-symbols-outlined text-xl">history</span>
            </div>
            <div class="overflow-hidden">
                <h4 class="text-white font-bold text-xs">PAYMENT LOG</h4>
                <p class="text-slate-500 text-[8px] font-black uppercase tracking-tighter truncate">HISTORY</p>
            </div>
        </div>

        <div onclick="window.location.href='savings.html'" class="glass-card rounded-[24px] p-4 flex items-center gap-3 active:scale-95 transition-all cursor-pointer">
            <div class="size-10 flex-shrink-0 rounded-xl bg-amber-500/10 flex items-center justify-center text-amber-500">
                <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1">savings</span>
            </div>
            <div class="overflow-hidden">
                <h4 class="text-white font-bold text-xs">Vault</h4>
                <p class="text-amber-500/60 text-[8px] font-black uppercase tracking-tighter truncate">Growth   (savings)</p>
            </div>
        </div>
    </div>
</main>

<div class="fixed bottom-0 left-0 right-0 p-6 z-50">
    <nav class="nav-dock max-w-sm mx-auto rounded-full h-20 px-8 flex items-center justify-between shadow-2xl">
        <a href="history.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-primary transition-all active:scale-90">
            <span class="material-symbols-outlined text-2xl">schedule</span>
            <span class="text-[8px] font-black uppercase tracking-widest">Logs</span>
        </a>
        
        <a href="pay.html" class="flex flex-col items-center -mt-14 group">
            <div class="size-16 rounded-full bg-primary flex items-center justify-center text-obsidian shadow-[0_0_30px_rgba(61,235,145,0.5)] active:scale-90 transition-all border-4 border-[#0D0D0D]">
                <span class="material-symbols-outlined text-3xl font-black">add</span>
            </div>
            <span class="text-[8px] font-black text-primary uppercase tracking-[0.2em] mt-2">Pay</span>
        </a>

        <a href="home.html" class="flex flex-col items-center gap-1 text-primary relative active:scale-90 nav-item-active">
            <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">home</span>
            <span class="text-[8px] font-black uppercase tracking-widest">Home</span>
        </a>

        <a href="savings.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-primary transition-all active:scale-90">
            <span class="material-symbols-outlined text-2xl">account_balance</span>
            <span class="text-[8px] font-black uppercase tracking-widest">Vault</span>
        </a>
    </nav>
</div>

<script>
    // Live Background Interaction
    document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth) * 100;
        const y = (e.clientY / window.innerHeight) * 100;
        document.getElementById('main-body').style.setProperty('--x', x + '%');
        document.getElementById('main-body').style.setProperty('--y', y + '%');
    });

    let isBalanceVisible = false;
    function togglePrivacy(e) {
        e.stopPropagation();
        isBalanceVisible = !isBalanceVisible;
        const balText = document.getElementById('display-balance');
        const eye = document.getElementById('eye-icon');
        if (isBalanceVisible) {
            balText.classList.remove('blur-md');
            eye.textContent = 'visibility';
            eye.classList.replace('text-slate-500', 'text-primary');
        } else {
            balText.classList.add('blur-md');
            eye.textContent = 'visibility_off';
            eye.classList.replace('text-primary', 'text-slate-500');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const activeMobile = localStorage.getItem('finnexus_temp_mobile');
        if (activeMobile) {
            const profile = JSON.parse(localStorage.getItem(`finnexus_profile_${activeMobile}`));
            if (profile?.name) document.getElementById('display-name').textContent = profile.name;
        }
        const savedBalance = localStorage.getItem('finnexus_balance') || "84500";
        document.getElementById('display-balance').textContent = `₹${parseFloat(savedBalance).toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
    });
</script>

</body>
</html>
