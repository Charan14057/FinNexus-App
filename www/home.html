<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus Command Center</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3deb91",
                        "background-dark": "#0D0D0D",
                        "obsidian": "#0D0D0D",
                        "teal-accent": "#008080",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        .aurora-bg {
            background: radial-gradient(circle at top right, rgba(61, 235, 145, 0.15), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(0, 128, 128, 0.2), transparent 40%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glossy-sphere {
            background: radial-gradient(circle at 30% 30%, #3deb91, #008080);
            box-shadow: 0 20px 50px rgba(61, 235, 145, 0.3), inset -10px -10px 30px rgba(0,0,0,0.5), inset 10px 10px 30px rgba(255,255,255,0.4);
        }
        .scan-ring { border: 2px dashed rgba(61, 235, 145, 0.3); border-radius: 50%; }
        
        /* CATCHY ENTRANCE ANIMATION */
        @keyframes pageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-page { animation: pageIn 0.8s ease-out forwards; }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 min-h-screen relative overflow-x-hidden aurora-bg animate-page">

<header class="flex items-center justify-between px-6 pt-8 pb-4">
    <div class="flex flex-col">
        <span class="text-xs font-medium text-primary tracking-widest uppercase opacity-80">Welcome back</span>
        <h1 class="text-3xl font-bold tracking-tight text-white mt-1">Hi, <span id="display-name">User</span></h1>
    </div>
    <div class="relative cursor-pointer active:scale-90 transition-transform" onclick="window.location.href='profile.html'">
        <div class="size-12 rounded-full border border-white/10 flex items-center justify-center bg-white/5 text-slate-400">
            <span class="material-symbols-outlined text-2xl">person</span>
        </div>
        <div class="absolute bottom-0.5 right-0.5 size-2.5 bg-primary border-2 border-obsidian rounded-full"></div>
    </div>
</header>

<div class="px-6 py-2">
    <div class="flex items-center gap-2">
        <div class="relative flex items-center justify-center">
            <span class="material-symbols-outlined text-primary text-xl relative z-10" style="font-variation-settings: 'FILL' 1">verified_user</span>
            <span class="absolute inset-0 bg-primary/40 blur-md rounded-full animate-pulse"></span>
        </div>
        <span class="text-primary text-[11px] font-bold tracking-widest uppercase">Defender Active</span>
    </div>
</div>

<div class="flex flex-col items-center justify-center py-12 relative">
    <div class="scan-ring absolute size-64 animate-[spin_10s_linear_infinite]"></div>
    <div class="scan-ring absolute size-72 opacity-50 animate-[spin_15s_linear_infinite_reverse]"></div>
    <button onclick="window.location.href='pay.html'" class="glossy-sphere size-48 rounded-full flex flex-col items-center justify-center gap-1 transition-transform active:scale-95 group relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-tr from-white/20 to-transparent pointer-events-none"></div>
        <span class="material-symbols-outlined text-white text-5xl font-light">qr_code_scanner</span>
        <span class="text-white font-black text-xl tracking-widest mt-2 uppercase">Pay Now</span>
    </button>
    <p class="text-primary/60 text-[10px] uppercase tracking-[0.3em] font-bold mt-12">Tap to Scan & Transact</p>
</div>

<div class="px-6 grid grid-cols-2 gap-4 pb-32">
    <div onclick="window.location.href='wallet.html'" class="glass-card col-span-2 rounded-xl p-5 flex justify-between items-center relative overflow-hidden group cursor-pointer active:scale-[0.98] transition-all">
        <div class="flex flex-col gap-1">
            <h4 class="text-white font-bold text-lg">Your Wallet</h4>
            <p class="text-slate-400 text-xs">Simplified. Secure. Instant.</p>
            <p id="display-balance" class="text-primary text-xl font-bold mt-2">₹84,500</p>
        </div>
        <div class="size-16 rounded-lg bg-gradient-to-br from-primary/10 to-teal-accent/20 flex items-center justify-center">
            <span class="material-symbols-outlined text-primary text-3xl">account_balance_wallet</span>
        </div>
    </div>

    <div onclick="window.location.href='history.html'" class="glass-card rounded-xl p-5 flex flex-col justify-between aspect-square group cursor-pointer active:scale-[0.98] transition-all">
        <div class="size-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
            <span class="material-symbols-outlined">history</span>
        </div>
        <div class="mt-4">
            <h4 class="text-white font-bold text-base">History</h4>
            <div class="flex items-center gap-1 text-primary text-[10px] mt-1">
                <span class="material-symbols-outlined text-xs" style="font-variation-settings: 'FILL' 1">check_circle</span>
                <span class="font-medium uppercase tracking-tighter">View recent</span>
            </div>
        </div>
    </div>

    <div onclick="window.location.href='savings.html'" class="glass-card rounded-xl p-5 flex flex-col justify-between aspect-square relative border-amber-500/20 group cursor-pointer active:scale-[0.98] transition-all">
        <div class="absolute top-4 right-4 flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
        </div>
        <div class="size-10 rounded-full bg-amber-500/10 flex items-center justify-center text-amber-500">
            <span class="material-symbols-outlined">savings</span>
        </div>
        <div class="mt-4">
            <h4 class="text-white font-bold text-base">Savings Jar</h4>
            <p class="text-amber-500 text-[10px] font-medium leading-tight mt-1">See update</p>
        </div>
    </div>
</div>

<div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[80%] max-w-xs z-50">
    <nav class="glass-card rounded-full p-2 flex items-center justify-around shadow-2xl bg-white/5 border-white/10">
        <a class="flex items-center justify-center w-12 h-12 text-slate-400 active:text-primary transition-colors" href="history.html">
            <span class="material-symbols-outlined">history</span>
        </a>
        <a class="flex items-center justify-center w-14 h-14 rounded-full bg-primary text-obsidian shadow-[0_0_25px_rgba(61,235,145,0.6)]" href="home.html">
            <span class="material-symbols-outlined font-bold text-2xl">home</span>
        </a>
        <a class="flex items-center justify-center w-12 h-12 text-slate-400 active:text-primary transition-colors" href="savings.html">
            <span class="material-symbols-outlined">savings</span>
        </a>
    </nav>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Identify User using the CORRECT key from your onboarding
        const activeMobile = localStorage.getItem('finnexus_temp_mobile');
        
        if (activeMobile) {
            const profile = JSON.parse(localStorage.getItem(`finnexus_profile_${activeMobile}`));

            // Update Greeting Name
            if (profile && profile.name) {
                document.getElementById('display-name').textContent = profile.name;
            }
        }

        // 2. Sync Wallet Balance from the Wallet Controller
        const savedBalance = localStorage.getItem('finnexus_balance');
        if (savedBalance) {
            // Using toLocaleString to make it look premium (e.g., 84,500)
            const formatted = parseFloat(savedBalance).toLocaleString('en-IN');
            document.getElementById('display-balance').textContent = `₹${formatted}`;
        }
    });
</script>

</body>
</html>
