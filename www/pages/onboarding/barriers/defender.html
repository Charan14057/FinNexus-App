<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus - Payment Blocked</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "emergency": "#dc2626",
                        "background-dark": "#0D0D0D",
                    },
                    fontFamily: {
                        "display": ["Inter", "Public Sans", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        .emergency-glow { box-shadow: 0 0 60px rgba(220, 38, 38, 0.25); }
        body { min-height: 100dvh; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 antialiased overflow-x-hidden">
    <div class="relative flex min-h-screen w-full flex-col bg-background-dark overflow-hidden">
        
        <div class="flex items-center p-6 justify-between z-10">
            <button onclick="exitToHome()" class="text-slate-100 flex size-12 shrink-0 items-center justify-center">
                <span class="material-symbols-outlined text-3xl">close</span>
            </button>
            <h2 class="text-slate-400 text-sm font-bold uppercase tracking-[0.2em] flex-1 text-center">Security Alert</h2>
            <div class="w-12"></div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center px-8 text-center space-y-12">
            <div class="relative">
                <div class="absolute inset-0 bg-emergency/20 blur-3xl rounded-full scale-150"></div>
                <div class="relative bg-emergency/10 p-10 rounded-full border border-emergency/30 emergency-glow">
                    <span class="material-symbols-outlined !text-[96px] text-emergency">shield_lock</span>
                </div>
            </div>

            <div class="space-y-4">
                <h1 class="text-emergency tracking-tighter text-5xl font-black leading-tight uppercase italic">
                    PAYMENT<br/>BLOCKED
                </h1>
                <div class="h-1 w-16 bg-emergency mx-auto rounded-full"></div>
            </div>

            <div class="max-w-xs mx-auto space-y-4">
                <p class="text-slate-100 text-xl font-semibold leading-snug">
                    This recipient is flagged for fraudulent activity.
                </p>
                <p class="text-slate-500 text-base leading-relaxed">
                    Transaction terminated to ensure your account security and prevent financial loss.
                </p>
            </div>
        </div>

        <div class="p-8 pb-12 space-y-6">
            <button onclick="reportAndExit()" class="w-full h-16 bg-emergency hover:bg-red-700 transition-all rounded-xl text-white text-lg font-bold flex items-center justify-center gap-3 shadow-2xl emergency-glow active:scale-[0.95]">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0">flag</span>
                Report & Close
            </button>
            <p class="text-center text-slate-600 text-[10px] font-medium uppercase tracking-[0.2em] px-8">
                Protecting your digital assets with FinNexus Core Security
            </p>
        </div>
    </div>

    <script>
        /* Update the script section in defender.html */
function exitToHome() {
    // Clear any temporary payment data
    sessionStorage.removeItem('pending_payment');
    // GO UP 3 LEVELS: barriers -> onboarding -> pages -> home.html
    window.location.href = '../../../home.html';
}

function reportAndExit() {
    alert("Merchant reported to FinNexus Core. Returning to safety.");
    exitToHome();
}
    </script>
</body>
</html>
