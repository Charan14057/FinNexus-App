<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus | Intercepted</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "emergency": "#ff4d4d",
                        "background-dark": "#0D0D0D",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        /* DANGER MESH BACKGROUND */
        .danger-bg {
            background: 
                radial-gradient(circle at 50% 50%, rgba(255, 77, 77, 0.1) 0%, transparent 60%),
                linear-gradient(180deg, #0D0D0D 0%, #050505 100%);
            position: relative;
            overflow: hidden;
        }

        /* SCANNELINE GLITCH EFFECT */
        .danger-bg::after {
            content: "";
            position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, rgba(255, 77, 77, 0.03) 0px, transparent 1px, transparent 2px);
            background-size: 100% 3px;
            pointer-events: none;
            animation: scanline 10s linear infinite;
        }
        @keyframes scanline { from { background-position: 0 0; } to { background-position: 0 100%; } }

        .emergency-glow { box-shadow: 0 0 50px rgba(255, 77, 77, 0.3); }
        
        /* SHIELD HEARTBEAT */
        .animate-shield {
            animation: shield-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes shield-pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 77, 77, 0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(255, 77, 77, 0.8)); }
        }

        .font-black-italic { font-weight: 900; font-style: italic; }
    </style>
</head>
<body class="danger-bg font-display text-slate-100 min-h-screen flex flex-col antialiased">

    <header class="flex items-center justify-between p-8 z-10">
        <button onclick="exitToHome()" class="size-11 flex items-center justify-center rounded-2xl bg-white/5 border border-white/10 active:scale-75 transition-transform">
            <span class="material-symbols-outlined text-white">close</span>
        </button>
        <div class="text-right">
            <h2 class="text-[10px] font-black uppercase tracking-[0.4em] text-emergency">FinNexus Defender</h2>
            <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest mt-0.5">Protocol 0-Block Active</p>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center px-8 text-center relative z-10">
        <div class="mb-12 relative">
            <div class="absolute inset-0 bg-emergency/20 blur-[80px] rounded-full"></div>
            <div class="relative bg-emergency/10 size-32 rounded-full border border-emergency/30 flex items-center justify-center emergency-glow animate-shield">
                <span class="material-symbols-outlined !text-6xl text-emergency" style="font-variation-settings: 'FILL' 1">gpp_maybe</span>
            </div>
        </div>

        <div class="space-y-4 mb-10">
            <h1 class="text-emergency font-black-italic text-5xl tracking-tighter leading-none uppercase">
                PAYMENT<br/><span class="text-white">BLOCKED</span>
            </h1>
            <div class="flex items-center justify-center gap-2">
                <div class="h-[1px] w-8 bg-emergency/50"></div>
                <p class="text-[10px] font-black text-emergency uppercase tracking-[0.4em]">Threat Level: Critical</p>
                <div class="h-[1px] w-8 bg-emergency/50"></div>
            </div>
        </div>

        <div class="max-w-xs mx-auto space-y-4 px-4">
            <p class="text-white text-lg font-black tracking-tight leading-tight uppercase">
                Merchant Identity Flagged
            </p>
            <p class="text-slate-500 text-[11px] font-bold uppercase leading-relaxed tracking-wider">
                This recipient node is indexed in our fraud database. The bridge has been severed to protect your assets.
            </p>
        </div>
    </main>

    <footer class="p-10 pb-16 space-y-6 relative z-10">
        <button onclick="reportAndExit()" class="w-full py-5 bg-emergency rounded-2xl text-black font-black text-sm uppercase tracking-[0.2em] flex items-center justify-center gap-3 shadow-[0_15px_30px_rgba(255,77,77,0.3)] active:scale-95 transition-all">
            <span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1">report</span>
            File Fraud Report
        </button>
        
        <p class="text-center text-slate-700 text-[8px] font-black uppercase tracking-[0.3em] px-8">
            Secured by Multi-Layer FinNexus AI Protocol
        </p>
    </footer>

    <script>
        function exitToHome() {
            // Clean up session data
            sessionStorage.removeItem('pending_payment');
            window.location.href = '../../../home.html';
        }

        function reportAndExit() {
            // 1. GATHER DATA FROM THE SCAM ATTEMPT
            const p = JSON.parse(sessionStorage.getItem('pending_payment')) || { 
                merchantName: "Unknown Threat", 
                amount: "0.00" 
            };

            // 2. LOG THE BLOCKED TRANSACTION TO HISTORY
            const history = JSON.parse(localStorage.getItem('finnexus_history') || '[]');
            const blockEntry = {
                merchant: p.merchantName,
                amount: p.amount,
                date: new Date().toLocaleDateString('en-GB'),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                category: 'Blocked',
                isSafe: false // This tells history.html to use the RED UI
            };

            history.unshift(blockEntry);
            localStorage.setItem('finnexus_history', JSON.stringify(history));

            // 3. EXIT
            alert("Threat Reported. Transaction data purged. Node has been blacklisted locally.");
            exitToHome();
        }
    </script>
</body>
</html>
