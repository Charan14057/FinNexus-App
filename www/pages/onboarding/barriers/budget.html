<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>FinNexus | Budget Alert</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { obsidian: '#0D0D0D', sunset: '#FF8C42', amberGlow: '#FFB347' },
                    fontFamily: { sans: ['Inter Tight', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(255, 140, 66, 0.4)); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 140, 66, 0.7)); }
        }
        .animate-glow { animation: pulse-glow 3s ease-in-out infinite; }
        .mesh-gradient { background: radial-gradient(circle at top left, rgba(255, 140, 66, 0.15), transparent 40%), radial-gradient(circle at bottom right, rgba(255, 179, 71, 0.1), transparent 40%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); }
        .glossy-button { background: linear-gradient(135deg, #FF8C42 0%, #FFB347 100%); box-shadow: 0 10px 20px -5px rgba(255, 140, 66, 0.5); }
    </style>
</head>
<body class="bg-obsidian text-white font-sans min-h-screen flex flex-col items-center justify-between mesh-gradient">

<main class="w-full max-w-md h-screen flex flex-col px-8 pt-16 pb-12 relative z-10">
    <section class="flex flex-col items-center mb-10">
        <div class="relative w-32 h-32 flex items-center justify-center animate-glow">
            <svg fill="none" height="120" viewbox="0 0 100 100" width="120" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 10L90 85H10L50 10Z" fill="url(#amber-gradient)"></path>
                <text fill="white" font-size="40" font-weight="900" text-anchor="middle" x="50" y="70">!</text>
                <defs>
                    <lineargradient id="amber-gradient" x1="50" x2="50" y1="10" y2="85">
                        <stop stop-color="#FFB347"></stop>
                        <stop offset="1" stop-color="#FF8C42"></stop>
                    </lineargradient>
                </defs>
            </svg>
        </div>
    </section>

    <section class="text-center mb-12">
        <h1 class="text-4xl font-bold tracking-tight mb-3">Budget Alert</h1>
        <p class="text-zinc-400 text-lg leading-relaxed">
            This transaction exceeds your <span id="display-category" class="text-white font-semibold">...</span> 
            budget by <span id="display-overage" class="text-sunset font-bold">₹0</span>
        </p>
    </section>

    <section class="flex-grow flex items-start justify-center">
        <div class="glass-card rounded-[32px] w-full p-8 flex flex-col items-center gap-6">
            <p class="text-zinc-500 text-xs uppercase tracking-widest font-semibold">Smart Reallocation</p>
            <div class="flex items-center justify-between w-full relative">
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 h-16 rounded-full border border-white/10 bg-white/5 flex items-center justify-center">
                        <span class="text-xs font-semibold text-zinc-400">Savings</span>
                    </div>
                    <span class="text-[10px] text-zinc-500 uppercase">Personal</span>
                </div>
                <div class="flex flex-col items-center flex-grow px-2">
                    <span id="reallocate-amount" class="text-sunset font-bold text-sm mb-1">₹0</span>
                    <div class="w-full h-[1px] bg-gradient-to-r from-transparent via-sunset to-transparent relative">
                        <div class="absolute right-0 -top-[3px] w-2 h-2 border-t border-r border-sunset rotate-45"></div>
                    </div>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 h-16 rounded-full border border-sunset/30 bg-sunset/10 flex items-center justify-center">
                        <span id="target-cat-label" class="text-xs font-semibold text-white">...</span>
                    </div>
                    <span class="text-[10px] text-zinc-500 uppercase">Budget</span>
                </div>
            </div>
            <p class="text-zinc-400 text-sm text-center px-4">
                We'll balance this by moving <span id="text-overage-bottom" class="text-white font-bold">₹0</span> from your <span class="text-white">Personal Savings</span>.
            </p>
        </div>
    </section>

    <section class="mt-12 space-y-4">
        <button onclick="approveReallocation()" class="glossy-button w-full py-5 rounded-2xl text-obsidian font-bold text-lg active:scale-[0.98] transition-transform">
            Proceed Anyway
        </button>
        <button onclick="cancelPayment()" class="glass-card w-full py-5 rounded-2xl text-zinc-400 font-semibold text-lg hover:text-white active:bg-white/5 transition-all">
            Cancel Payment
        </button>
    </section>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const pending = JSON.parse(sessionStorage.getItem('pending_payment'));
        if (pending) {
            document.getElementById('display-category').textContent = pending.category;
            document.getElementById('target-cat-label').textContent = pending.category;
            
            // MATH FIX: Use the calculated overage from pay.html
            const overageVal = `₹${parseFloat(pending.overage).toLocaleString('en-IN')}`;
            document.getElementById('display-overage').textContent = overageVal;
            document.getElementById('reallocate-amount').textContent = overageVal;
            document.getElementById('text-overage-bottom').textContent = overageVal;
        }
    });

    function approveReallocation() {
        const pending = JSON.parse(sessionStorage.getItem('pending_payment'));
        pending.source = 'Savings Overflow';
        sessionStorage.setItem('pending_payment', JSON.stringify(pending));
        
        // --- FIXED PATH: GO BACK ONE FOLDER ---
        // Location is barriers/ -> goes back to onboarding/success.html
        window.location.href = '../success.html'; 
    }

    function cancelPayment() {
        sessionStorage.removeItem('pending_payment');
        // --- FIXED PATH: GO BACK THREE FOLDERS ---
        // barriers/ -> onboarding/ -> pages/ -> home.html
        window.location.href = '../../../home.html';
    }
</script>
</body>
</html>
