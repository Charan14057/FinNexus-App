<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus - UPI Selection</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter Tight', sans-serif;
            background-color: #0D0D0D;
            background-image: 
                radial-gradient(circle at top right, rgba(6, 182, 212, 0.15), transparent 40%),
                radial-gradient(circle at top right, rgba(16, 185, 129, 0.1), transparent 60%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .selected-ring {
            border: 1px solid rgba(6, 182, 212, 0.6) !important;
            background: rgba(6, 182, 212, 0.05);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }
        .btn-emerald-gloss {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4),
                        inset 0 2px 4px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="text-slate-100 p-6 flex flex-col items-center">
    
    <header class="w-full max-w-md flex items-center justify-between mb-8">
        <button onclick="window.location.href='step-1.html'" class="flex items-center gap-2 text-gray-400 hover:text-white transition-all">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            <span class="text-sm font-bold uppercase tracking-widest">Back</span>
        </button>
        <h2 class="text-lg font-bold tracking-tight">FinNexus</h2>
        <div class="w-12"></div>
    </header>

    <div class="w-full max-w-md mb-10">
        <div class="flex justify-between items-end mb-2">
            <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-cyan-400">Step 2 of 3</span>
            <span class="text-xs font-medium text-gray-500">66% Complete</span>
        </div>
        <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
            <div class="h-full rounded-full bg-gradient-to-r from-cyan-500 to-electric-emerald shadow-[0_0_10px_#06b6d4]" style="width: 66.6%;"></div>
        </div>
    </div>

    <div class="w-full max-w-md mb-8">
        <h1 class="text-3xl font-bold leading-tight tracking-tight text-white">Which UPI app do you use most?</h1>
        <p class="text-gray-400 mt-2 text-sm">Select your primary wallet for a faster firewall bridge.</p>
    </div>

    <div class="grid grid-cols-2 gap-4 w-full max-w-md pb-32" id="upi-grid">
        
        <div class="glass-card flex flex-col items-center gap-4 p-6 cursor-pointer selected-ring relative group" data-app="Google Pay">
            <div class="w-14 h-14 flex items-center justify-center bg-white rounded-2xl shadow-lg">
                <svg viewBox="0 0 48 48" width="32" height="32">
                    <path fill="#4285F4" d="M46.1,24.5c0-1.6-0.1-3.1-0.4-4.5H24v8.6h12.4c-0.5,2.9-2.2,5.3-4.6,6.9v5.7h7.5C43.7,37.2,46.1,31.3,46.1,24.5z"/>
                    <path fill="#34A853" d="M24,47c6.2,0,11.4-2.1,15.2-5.6l-7.5-5.7c-2.1,1.4-4.7,2.2-7.7,2.2c-6,0-11-4-12.8-9.5H3.5v5.9C7.3,41.7,15.1,47,24,47z"/>
                    <path fill="#FBBC05" d="M11.2,28.4c-0.5-1.4-0.7-2.9-0.7-4.4s0.2-3,0.7-4.4V13.7H3.5c-1.6,3.2-2.5,6.7-2.5,10.3s0.9,7.1,2.5,10.3L11.2,28.4z"/>
                    <path fill="#EA4335" d="M24,10.7c3.4,0,6.4,1.2,8.8,3.4l6.6-6.6C35.4,3.8,30.2,1.5,24,1.5c-8.9,0-16.7,5.3-20.5,13.1l7.7,5.9C13,14.8,18,10.7,24,10.7z"/>
                </svg>
            </div>
            <p class="text-white text-xs font-bold uppercase tracking-widest">Google Pay</p>
            <div class="absolute top-3 right-3 checkmark-ui">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#10B981"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
        </div>

        <div class="glass-card flex flex-col items-center gap-4 p-6 cursor-pointer relative" data-app="PhonePe">
            <div class="w-14 h-14 flex items-center justify-center bg-[#5f259f] rounded-2xl shadow-lg">
                <span class="text-white font-black text-2xl italic">P</span>
            </div>
            <p class="text-white text-xs font-bold uppercase tracking-widest">PhonePe</p>
        </div>

        <div class="glass-card flex flex-col items-center gap-4 p-6 cursor-pointer relative" data-app="Paytm">
            <div class="w-14 h-14 flex items-center justify-center bg-[#00baf2] rounded-2xl shadow-lg">
                <span class="text-white font-black text-xs">Paytm</span>
            </div>
            <p class="text-white text-xs font-bold uppercase tracking-widest">Paytm</p>
        </div>

        <div class="glass-card flex flex-col items-center gap-4 p-6 cursor-pointer relative" data-app="Amazon Pay">
            <div class="w-14 h-14 flex items-center justify-center bg-[#232f3e] rounded-2xl shadow-lg">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="#FF9900">
                    <path d="M15.9,13.1c-0.1,0-0.2,0.1-0.2,0.1c-1.3,1.3-3.6,1.4-5,0.2c-0.1-0.1-0.2-0.1-0.3,0l-1,1c-0.1,0.1-0.1,0.2,0,0.3 c2.2,1.9,5.7,1.8,7.7-0.1c0.1-0.1,0.1-0.2,0-0.3L15.9,13.1z"/>
                    <path d="M22,12c0,5.5-4.5,10-10,10S2,17.5,2,12S6.5,2,12,2S22,6.5,22,12z M12,4c-4.4,0-8,3.6-8,8s3.6,8,8,8s8-3.6,8-8S16.4,4,12,4z"/>
                </svg>
            </div>
            <p class="text-white text-xs font-bold uppercase tracking-widest">Amazon Pay</p>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 bg-gradient-to-t from-[#0D0D0D] to-transparent">
        <button id="next-btn" class="btn-emerald-gloss w-full h-16 rounded-2xl text-white font-bold text-lg tracking-wider flex items-center justify-center gap-3 active:scale-95 transition-transform">
            Next Step
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.glass-card');
            const nextBtn = document.getElementById('next-btn');
            let selectedApp = "Google Pay";

            const checkmarkSVG = `<div class="absolute top-3 right-3 checkmark-ui"><svg width="20" height="20" viewBox="0 0 24 24" fill="#10B981"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>`;

            cards.forEach(card => {
                card.addEventListener('click', () => {
                    // Reset all cards
                    cards.forEach(c => {
                        c.classList.remove('selected-ring');
                        const check = c.querySelector('.checkmark-ui');
                        if (check) check.remove();
                    });

                    // Select this card
                    card.classList.add('selected-ring');
                    card.insertAdjacentHTML('beforeend', checkmarkSVG);
                    selectedApp = card.dataset.app;
                });
            });

            nextBtn.addEventListener('click', () => {
                localStorage.setItem('finnexus_preferred_upi', selectedApp);
                window.location.href = 'step-3.html';
            });
        });
    </script>
</body>
</html>
