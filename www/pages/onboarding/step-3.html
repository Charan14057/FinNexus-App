<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus | Activation</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Inter Tight', sans-serif;
            background-color: #0D0D0D;
            min-height: 100vh;
            overflow: hidden;
            color: white;
        }

        /* SYNCED LIVE BACKGROUND */
        .aurora-mesh {
            background: 
                radial-gradient(circle at var(--x, 50%) var(--y, -10%), rgba(61, 235, 145, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 50% 110%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
            position: fixed; inset: 0; pointer-events: none; z-index: -1;
            transition: background 0.3s ease-out;
        }

        .glass-checkbox-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }

        .custom-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(6, 182, 212, 0.4);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        #terms-check:checked + .custom-checkbox {
            background-color: #06B6D4;
            border-color: #06B6D4;
        }

        .tick-mark {
            color: black;
            font-size: 18px;
            font-weight: 900;
            display: none;
        }

        #terms-check:checked + .custom-checkbox .tick-mark {
            display: block;
        }

        .btn-3d-emerald {
            background: linear-gradient(180deg, #3deb91 0%, #1a9e66 100%);
            box-shadow: 0 12px 30px -10px rgba(61, 235, 145, 0.5),
                        inset 0 2px 4px rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .btn-inactive {
            background: #222 !important;
            box-shadow: none !important;
            color: #555 !important;
            pointer-events: none;
            opacity: 0.5;
        }

        .fade-in { animation: fadeIn 0.8s ease forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6 flex flex-col items-center">
    <div class="aurora-mesh" id="mesh"></div>
    
    <header class="relative z-10 w-full max-w-sm flex items-center justify-between mb-10 fade-in">
        <button onclick="window.history.back()" class="p-2 -ml-2 text-slate-500 hover:text-white transition-all active:scale-75">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </button>
        <h2 class="text-xs font-black tracking-[0.3em] uppercase text-primary italic">FinNexus Node</h2>
        <div class="w-10"></div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center w-full max-w-sm text-center -mt-10">
        <div class="mb-12 relative fade-in">
            <div class="absolute inset-0 bg-cyan-400/10 blur-[60px] rounded-full animate-pulse"></div>
            <div class="relative w-32 h-32 bg-white/5 border border-white/10 rounded-full flex items-center justify-center">
                <span class="material-symbols-outlined text-6xl text-cyan-400" style="font-variation-settings: 'FILL' 1">shield_with_heart</span>
            </div>
        </div>

        <div class="space-y-3 mb-10 fade-in">
            <h1 class="text-3xl font-black tracking-tight text-white uppercase italic">Final Protocol</h1>
            <p class="text-slate-500 text-[11px] font-bold uppercase tracking-widest max-w-[250px] mx-auto leading-relaxed">
                Confirm your agreement to initialize the firewall bridge.
            </p>
        </div>

        <label class="glass-checkbox-card w-full rounded-3xl p-6 flex items-center gap-5 cursor-pointer hover:bg-white/5 transition-all mb-10 fade-in">
            <input type="checkbox" id="terms-check" class="hidden" onchange="toggleButton()"/>
            <div class="custom-checkbox">
                <span class="tick-mark">✓</span>
            </div>
            <span class="text-left text-[11px] font-bold uppercase leading-relaxed tracking-wider text-slate-300">
                I accept the FinNexus Terms & Deployment Protocols.
            </span>
        </label>
    </main>

    <footer class="p-8 w-full max-w-sm fade-in">
        <button id="activate-btn" class="btn-3d-emerald btn-inactive w-full py-5 rounded-2xl text-black font-black text-sm tracking-[0.3em] uppercase flex items-center justify-center gap-3 active:scale-95 transition-all">
            INITIALIZE CORE
            <span class="material-symbols-outlined text-lg">bolt</span>
        </button>
    </footer>

    <script>
        const activeUser = localStorage.getItem('fn_user');
        const mesh = document.getElementById('mesh');

        // 1. Live Background Sync
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            mesh.style.setProperty('--x', `${x}%`);
            mesh.style.setProperty('--y', `${y}%`);
        });

        // Checkbox Logic: Only enable button if checked
        function toggleButton() {
            const checkbox = document.getElementById('terms-check');
            const btn = document.getElementById('activate-btn');
            
            if (checkbox.checked) {
                btn.classList.remove('btn-inactive');
                if (navigator.vibrate) navigator.vibrate(15);
            } else {
                btn.classList.add('btn-inactive');
            }
        }

        document.getElementById('activate-btn').addEventListener('click', () => {
            if (!activeUser) return window.location.href = '../../index.html';

            // GATHER DATA SAVED IN STEP 1 & 2
            const existingProfile = JSON.parse(localStorage.getItem(`profile_${activeUser}`)) || {};
            
            // SEAL PERMANENT PROFILE
            const finalProfile = {
                ...existingProfile,
                status: "ACTIVE",
                activationDate: new Date().toISOString(),
                termsAccepted: true
            };

            // SAVE TO PERMANENT USER-KEYED DATABASE
            localStorage.setItem(`profile_${activeUser}`, JSON.stringify(finalProfile));
            
            // INITIALIZE BLANK WALLET FOR THIS USER
            if (!localStorage.getItem(`${activeUser}_balance`)) {
                localStorage.setItem(`${activeUser}_balance`, "0");
            }

            // REDIRECT TO DASHBOARD
            window.location.href = '../../home.html';
        });
    </script>
</body>
</html>
