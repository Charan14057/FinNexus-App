<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus | Payment Secure</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .aurora-glow { background: radial-gradient(circle at 0% 0%, rgba(61, 235, 145, 0.15) 0%, transparent 50%), radial-gradient(circle at 100% 100%, rgba(61, 235, 145, 0.1) 0%, transparent 50%); background-color: #0D0D0D; }
        .gloss-button { background: linear-gradient(180deg, #3deb91 0%, #2eb46e 100%); box-shadow: 0 10px 25px rgba(61, 235, 145, 0.3); }
        .shield-glow { filter: drop-shadow(0 0 25px rgba(61, 235, 145, 0.4)); }
    </style>
</head>
<body class="font-display bg-background-dark text-slate-100 min-h-screen flex items-center justify-center p-4 aurora-glow">

<div class="relative w-full max-w-md h-[844px] flex flex-col overflow-hidden">
    
    <div class="flex-grow flex flex-col items-center justify-center px-6">
        <div class="relative mb-8">
            <div class="absolute -inset-4 bg-[#3deb91]/20 blur-3xl rounded-full"></div>
            <div class="relative w-32 h-32 flex items-center justify-center bg-gradient-to-br from-[#3deb91]/30 to-[#3deb91]/10 rounded-full border border-[#3deb91]/40 shield-glow">
                <span class="material-icons-round text-7xl text-[#3deb91]">verified_user</span>
            </div>
        </div>
        <h1 class="text-3xl font-bold text-white mb-2 text-center tracking-tight">Payment Secure</h1>
        <p class="text-slate-400 text-xs mb-8">Transaction ID: <span id="txn-id">#FNX-99284-SEC</span></p>

        <div class="w-full glass-card rounded-3xl p-6 mb-4">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <p class="text-slate-500 text-[10px] uppercase tracking-widest mb-1">Paid To</p>
                    <h2 id="display-merchant" class="text-xl font-bold text-white">Merchant Name</h2>
                </div>
                <div class="bg-[#3deb91]/10 p-3 rounded-2xl">
                    <span id="display-icon" class="material-icons-round text-[#3deb91]">payments</span>
                </div>
            </div>
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-slate-500 text-[10px] uppercase tracking-widest mb-1">Amount</p>
                    <p id="display-amount" class="text-4xl font-black text-white">₹0.00</p>
                </div>
                <div class="text-right">
                    <span id="display-category" class="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-bold bg-white/5 text-slate-300 border border-white/10 uppercase tracking-widest">
                        Category: Food
                    </span>
                </div>
            </div>
        </div>

        <div class="w-full glass-card rounded-3xl p-5 space-y-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-full bg-[#3deb91]/20 flex items-center justify-center">
                        <span class="material-icons-round text-[#3deb91] text-sm">shield</span>
                    </div>
                    <span class="text-sm font-medium text-slate-200">Defender Check</span>
                </div>
                <span class="text-[#3deb91] text-[10px] font-black px-2 py-1 bg-[#3deb91]/10 rounded uppercase">100% Safe</span>
            </div>
            <div class="h-px bg-white/5 w-full"></div>
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center">
                        <span class="material-icons-round text-blue-400 text-sm">account_balance_wallet</span>
                    </div>
                    <span class="text-sm font-medium text-slate-200">Controller Status</span>
                </div>
                <span id="display-budget-status" class="text-slate-400 text-[10px] font-bold uppercase">Within Budget</span>
            </div>
        </div>
    </div>

    <div class="p-8 pb-12 space-y-4">
        <button onclick="finalizeAndHome()" class="w-full py-5 rounded-2xl text-black font-black text-lg uppercase tracking-widest gloss-button active:scale-95 transition-all">
            Back to Home
        </button>
        <button class="w-full py-2 text-slate-500 font-bold text-xs uppercase tracking-widest hover:text-white transition-colors">
            Download Receipt
        </button>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const pending = JSON.parse(sessionStorage.getItem('pending_payment'));
        
        if (pending) {
            // 1. Generate unique ID
            const randomID = Math.floor(10000 + Math.random() * 90000);
            document.getElementById('txn-id').textContent = `#FNX-${randomID}-SEC`;

            // 2. Map UI Data
            document.getElementById('display-merchant').textContent = pending.merchantName;
            document.getElementById('display-amount').textContent = `₹${pending.amount}`;
            document.getElementById('display-category').textContent = `Category: ${pending.category}`;
            
            // 3. Show Budget Status
            const statusLabel = document.getElementById('display-budget-status');
            if (pending.source === 'Savings Overflow') {
                statusLabel.textContent = "Funded from Savings";
                statusLabel.classList.add('text-amber-500');
            } else {
                statusLabel.textContent = "Within Monthly Budget";
            }
        }
    });

    function finalizeAndHome() {
        const pending = JSON.parse(sessionStorage.getItem('pending_payment'));
        
        if (pending) {
            // A. Update Main Wallet Balance
            let currentBal = parseFloat(localStorage.getItem('finnexus_balance') || 0);
            localStorage.setItem('finnexus_balance', (currentBal - parseFloat(pending.amount)).toFixed(2));

            // B. Update Category Spent
            let catKey = `budget_${pending.category.toLowerCase()}_spent`;
            let currentSpent = parseFloat(localStorage.getItem(catKey) || 0);
            localStorage.setItem(catKey, (currentSpent + parseFloat(pending.amount)).toFixed(2));

            // C. Push to History
            let history = JSON.parse(localStorage.getItem('finnexus_history') || '[]');
            history.unshift({
                id: document.getElementById('txn-id').textContent,
                merchant: pending.merchantName,
                amount: pending.amount,
                category: pending.category,
                date: new Date().toLocaleDateString(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                isSafe: true
            });
            localStorage.setItem('finnexus_history', JSON.stringify(history));
        }

        // --- THE FIXED PATH ---
        sessionStorage.removeItem('pending_payment');
        // Structure: onboarding -> pages -> home.html
        window.location.href = '../../home.html';
    }
</script>
</body>
</html>
