<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus | Wallet Control</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { 
                        "primary": "#3deb91", 
                        "background-dark": "#0D0D0D", 
                        "obsidian": "#0D0D0D",
                        "error-red": "#ff4d4d", 
                        "warning-orange": "#FF8C42" 
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        .aurora-bg {
            background: 
                radial-gradient(circle at var(--x, 80%) var(--y, 20%), rgba(61, 235, 145, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(0, 128, 128, 0.1) 0%, transparent 40%),
                linear-gradient(180deg, #0D0D0D 0%, #050505 100%);
            min-height: 100vh;
            transition: background 0.3s ease;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .big-number { font-size: 2.5rem; line-height: 1; letter-spacing: -0.05em; font-weight: 900; }
        .status-badge { font-size: 8px; font-weight: 900; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        
        .nav-dock { background: rgba(13, 13, 13, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-item-active { color: #3deb91 !important; filter: drop-shadow(0 0 8px rgba(61, 235, 145, 0.5)); }
        .nav-item-active::after {
            content: ""; position: absolute; bottom: -10px; width: 4px; height: 4px;
            background: #3deb91; border-radius: 50%; box-shadow: 0 0 10px #3deb91;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="aurora-bg font-display text-slate-100 p-6 pb-40" id="main-body">

    <header class="flex items-center justify-between mb-8 pt-4">
        <button onclick="window.location.href='home.html'" class="size-11 flex items-center justify-center rounded-2xl glass-card active:scale-75 transition-transform">
            <span class="material-symbols-outlined text-white">arrow_back</span>
        </button>
        <div class="text-right">
            <h1 class="text-[10px] font-black uppercase tracking-[0.4em] text-primary italic">Protocol Vault</h1>
            <p id="top-countdown" class="text-[10px] text-white font-black uppercase tracking-widest mt-0.5 underline decoration-primary">Connecting Node...</p>
        </div>
    </header>

    <section class="mb-10 animate-slide">
        <div class="glass-card rounded-[40px] p-8 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-5">
                <span class="material-symbols-outlined text-7xl text-primary">account_balance_wallet</span>
            </div>
            <div class="flex justify-between items-start mb-2">
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Available Capital</p>
                <button onclick="editMainBalance()" class="text-primary active:scale-90 transition-transform"><span class="material-symbols-outlined text-sm">edit</span></button>
            </div>
            <h2 id="live-wallet-balance" class="big-number text-white mb-6">₹0.00</h2>
            
            <div class="pt-6 border-t border-white/5">
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500 mb-1">Monthly Budget Allocation</p>
                <div class="flex justify-between items-baseline">
                    <h3 id="total-monthly-budget" class="text-2xl font-black text-primary">₹0.00</h3>
                    <p id="mid-countdown" class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter italic text-right">Ends in 0 Days</p>
                </div>
            </div>
        </div>
    </section>

    <div class="px-2 mb-4 flex items-center justify-between animate-slide" style="animation-delay: 0.1s">
        <div class="flex flex-col">
            <h3 class="text-xs font-black uppercase tracking-[0.2em] text-slate-500">Allocations</h3>
            <span id="health-summary" class="text-[8px] font-bold text-primary uppercase tracking-widest mt-1">All Systems Optimal</span>
        </div>
        <div class="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-full border border-white/5">
            <span class="material-symbols-outlined text-[12px] text-primary animate-pulse">timer</span>
            <span id="list-countdown" class="text-[9px] font-black text-white uppercase tracking-tighter">0 Days Left</span>
        </div>
    </div>

    <section class="mb-10 space-y-4" id="category-list"></section>

    <div class="space-y-3 animate-slide" style="animation-delay: 0.3s">
        <button onclick="addNewCategory()" class="w-full py-4 border border-dashed border-white/10 rounded-3xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-primary transition-all">
            + Create New Segment
        </button>
        <button onclick="manualReset()" class="w-full py-5 rounded-3xl bg-error-red/10 border border-error-red/20 text-error-red font-black uppercase text-xs tracking-[0.4em] active:scale-95 transition-all flex items-center justify-center gap-3">
            <span class="material-symbols-outlined text-sm">restart_alt</span> Reset Protocol
        </button>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-6 z-50">
        <nav class="nav-dock max-w-sm mx-auto rounded-full h-20 px-8 flex items-center justify-between shadow-2xl">
            <a href="history.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-primary transition-all active:scale-90">
                <span class="material-symbols-outlined text-2xl">schedule</span>
            </a>
            <a href="pay.html" class="flex flex-col items-center -mt-14 group">
                <div class="size-16 rounded-full bg-primary flex items-center justify-center text-obsidian shadow-[0_0_30px_rgba(61,235,145,0.5)] active:scale-90 transition-all border-4 border-[#0D0D0D]">
                    <span class="material-symbols-outlined text-3xl font-black">add</span>
                </div>
            </a>
            <a href="home.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-primary transition-all active:scale-90">
                <span class="material-symbols-outlined text-2xl">home</span>
            </a>
            <a href="wallet.html" class="flex flex-col items-center gap-1 text-primary relative active:scale-90 nav-item-active">
                <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">account_balance</span>
            </a>
        </nav>
    </div>

<script>
    const activeUser = localStorage.getItem('fn_user');
    if (!activeUser) { window.location.href = 'index.html'; }

    const keys = {
        balance: `${activeUser}_balance`,
        walletData: `${activeUser}_wallet_data`,
        cycleEnd: `${activeUser}_cycle_end`,
        cycleStart: `${activeUser}_cycle_start`,
        spentPrefix: (name) => `${activeUser}_budget_${name.toLowerCase()}_spent`,
        cumulativePrefix: (name) => `${activeUser}_budget_${name.toLowerCase()}_cumulative_saved`
    };

    function loadAndCheck() {
        // 1. Initial Data Setup
        let walletData = JSON.parse(localStorage.getItem(keys.walletData));
        
        // AUTO-INJECT COMMON CATEGORIES FOR NEW USERS
        if (!walletData || walletData.categories.length === 0) {
            walletData = { 
                categories: [
                    { name: 'Food', limit: 0, icon: 'restaurant' },
                    { name: 'Shopping', limit: 0, icon: 'shopping_bag' },
                    { name: 'Travel', limit: 0, icon: 'commute' },
                    { name: 'Bills', limit: 0, icon: 'receipt_long' }
                ] 
            };
            localStorage.setItem(keys.walletData, JSON.stringify(walletData));
        }

        // 2. Cycle Logic
        const expiryStr = localStorage.getItem(keys.cycleEnd);
        if (!expiryStr) {
            const start = new Date();
            const end = new Date();
            end.setDate(start.getDate() + 30);
            localStorage.setItem(keys.cycleStart, start.toISOString());
            localStorage.setItem(keys.cycleEnd, end.toISOString());
        } else if (new Date() > new Date(expiryStr)) {
            performMonthEndSweep();
        }
        renderUI();
    }

    function renderUI() {
        const walletData = JSON.parse(localStorage.getItem(keys.walletData)) || { categories: [] };
        const balance = parseFloat(localStorage.getItem(keys.balance) || 0);
        const list = document.getElementById('category-list');
        
        document.getElementById('live-wallet-balance').textContent = `₹${balance.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
        
        const end = new Date(localStorage.getItem(keys.cycleEnd));
        const diff = Math.max(0, Math.ceil((end - new Date()) / (1000 * 60 * 60 * 24)));
        document.getElementById('top-countdown').textContent = `${diff} Days to Reset`;
        document.getElementById('mid-countdown').textContent = `Ends in ${diff} Days`;
        document.getElementById('list-countdown').textContent = `${diff} Days Left`;

        list.innerHTML = '';
        let totalMonthlyBudget = 0;
        let criticalCount = 0;

        walletData.categories.forEach((cat, index) => {
            const spent = parseFloat(localStorage.getItem(keys.spentPrefix(cat.name)) || 0);
            const limit = parseFloat(cat.limit) || 0;
            totalMonthlyBudget += limit;

            const percent = limit > 0 ? (spent / limit) * 100 : 0;
            let amountColor = 'text-primary'; 
            let statusText = 'Optimal';
            let statusBg = 'bg-primary/10';

            if (limit === 0) {
                statusText = 'NOT SET';
                statusBg = 'bg-white/5';
                amountColor = 'text-slate-500';
            } else if (percent >= 90) {
                amountColor = 'text-error-red';
                statusText = 'Critical';
                statusBg = 'bg-error-red/10';
                criticalCount++;
            } else if (percent >= 75) {
                amountColor = 'text-warning-orange';
                statusText = 'At Risk';
                statusBg = 'bg-warning-orange/10';
            }

            list.innerHTML += `
                <div class="glass-card p-5 rounded-[32px] space-y-4 animate-slide" style="animation-delay: ${index * 0.1}s">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3">
                            <div class="size-10 rounded-2xl bg-white/5 flex items-center justify-center text-primary">
                                <span class="material-symbols-outlined text-xl">${cat.icon || 'segment'}</span>
                            </div>
                            <div>
                                <span class="text-[10px] font-black uppercase text-slate-500 tracking-widest">${cat.name}</span>
                                <p class="text-white font-black text-xs">${limit > 0 ? '₹'+limit.toLocaleString() : 'INITIALIZE LIMIT'}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editCategory(${index})" class="size-8 rounded-full bg-white/5 flex items-center justify-center text-primary active:scale-75 transition-all">
                                <span class="material-symbols-outlined text-sm">edit</span>
                            </button>
                            <button onclick="deleteCategory(${index})" class="size-8 rounded-full bg-white/5 flex items-center justify-center text-error-red active:scale-75 transition-all">
                                <span class="material-symbols-outlined text-sm">delete</span>
                            </button>
                        </div>
                    </div>
                    <div class="flex justify-between items-end">
                        <div class="space-y-0.5">
                            <p class="text-[9px] font-black text-slate-500 uppercase tracking-tighter">Volume Spent</p>
                            <h4 class="text-3xl font-black ${amountColor}">₹${spent.toLocaleString()}</h4>
                        </div>
                        <div class="text-right flex flex-col items-end gap-1.5">
                            <span class="status-badge ${statusBg} ${amountColor}">${statusText}</span>
                            <span class="text-[8px] font-black text-slate-600 uppercase tracking-tighter italic">${diff} Days Left</span>
                        </div>
                    </div>
                </div>`;
        });

        document.getElementById('total-monthly-budget').textContent = `₹${totalMonthlyBudget.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
        const healthEl = document.getElementById('health-summary');
        healthEl.textContent = criticalCount > 0 ? `${criticalCount} Segment(s) Critical` : 'All Systems Optimal';
        healthEl.className = criticalCount > 0 ? 'text-[8px] font-bold text-error-red uppercase tracking-widest mt-1' : 'text-[8px] font-bold text-primary uppercase tracking-widest mt-1';
    }

    function editCategory(index) {
        const walletData = JSON.parse(localStorage.getItem(keys.walletData));
        const cat = walletData.categories[index];
        const newLimit = prompt(`Set limit for ${cat.name}:`, cat.limit);
        if (newLimit !== null && !isNaN(parseFloat(newLimit))) {
            walletData.categories[index].limit = parseFloat(newLimit);
            localStorage.setItem(keys.walletData, JSON.stringify(walletData));
            renderUI();
        }
    }

    function deleteCategory(index) {
        if(confirm("Terminate this segment?")) {
            const walletData = JSON.parse(localStorage.getItem(keys.walletData));
            const catName = walletData.categories[index].name.toLowerCase();
            walletData.categories.splice(index, 1);
            localStorage.removeItem(keys.spentPrefix(catName));
            localStorage.setItem(keys.walletData, JSON.stringify(walletData));
            renderUI();
        }
    }

    function editMainBalance() {
        const current = localStorage.getItem(keys.balance) || "0";
        const newVal = prompt("Update Total Capital:", current);
        if (newVal !== null && !isNaN(parseFloat(newVal))) {
            localStorage.setItem(keys.balance, parseFloat(newVal).toFixed(2));
            renderUI();
        }
    }

    function manualReset() {
        if (confirm("End cycle now? Surpluses will migrate to Vault.")) performMonthEndSweep();
    }

    function performMonthEndSweep() {
        const walletData = JSON.parse(localStorage.getItem(keys.walletData)) || { categories: [] };
        walletData.categories.forEach(cat => {
            const spent = parseFloat(localStorage.getItem(keys.spentPrefix(cat.name)) || 0);
            const limit = parseFloat(cat.limit) || 0;
            const surplus = Math.max(0, limit - spent);
            const currentSavings = parseFloat(localStorage.getItem(keys.cumulativePrefix(cat.name)) || 0);
            localStorage.setItem(keys.cumulativePrefix(cat.name), (currentSavings + surplus).toFixed(2));
            localStorage.setItem(keys.spentPrefix(cat.name), "0");
        });
        const start = new Date();
        const end = new Date();
        end.setDate(start.getDate() + 30);
        localStorage.setItem(keys.cycleStart, start.toISOString());
        localStorage.setItem(keys.cycleEnd, end.toISOString());
        renderUI();
    }

    function addNewCategory() {
        const name = prompt("Segment Name:");
        const limit = prompt("Monthly Limit:");
        if (name && limit && !isNaN(parseFloat(limit))) {
            const walletData = JSON.parse(localStorage.getItem(keys.walletData)) || { categories: [] };
            walletData.categories.push({ name, limit: parseFloat(limit), icon: 'toll' });
            localStorage.setItem(keys.spentPrefix(name), "0");
            localStorage.setItem(keys.walletData, JSON.stringify(walletData));
            renderUI();
        }
    }

    document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth) * 100;
        const y = (e.clientY / window.innerHeight) * 100;
        document.getElementById('main-body').style.setProperty('--x', `${x}%`);
        document.getElementById('main-body').style.setProperty('--y', `${y}%`);
    });

    document.addEventListener('DOMContentLoaded', loadAndCheck);
</script>
</body>
</html>
