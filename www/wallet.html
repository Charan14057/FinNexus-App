<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus | Wallet Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#3deb91", "background-dark": "#0D0D0D", "error-red": "#ff4d4d", "obsidian-card": "#151515" },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        .aurora-glow { background: radial-gradient(circle at 50% 0%, rgba(61, 235, 145, 0.1) 0%, transparent 70%); background-color: #0D0D0D; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .progress-fill { transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .big-number { font-size: 2.5rem; line-height: 1; letter-spacing: -0.05em; font-weight: 900; }
        body { min-height: 100dvh; color: white; overflow-x: hidden; }
    </style>
</head>
<body class="aurora-glow font-display p-6 pb-40">

    <header class="flex items-center justify-between mb-8">
        <button onclick="window.location.href='home.html'" class="size-12 flex items-center justify-center rounded-2xl bg-white/5 border border-white/10 active:scale-75 transition-transform">
            <span class="material-symbols-outlined text-white">arrow_back</span>
        </button>
        <div class="text-right">
            <h1 class="text-[10px] font-black uppercase tracking-[0.4em] text-primary">Protocol Dashboard</h1>
            <p id="days-left" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-0.5">Cycle: Calculating...</p>
        </div>
    </header>

    <section class="mb-10">
        <div class="glass-panel rounded-[40px] p-8 relative overflow-hidden">
            <div class="flex justify-between items-start mb-2">
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Available Capital</p>
                <button onclick="editMainBalance()" class="text-primary active:scale-90 transition-transform"><span class="material-symbols-outlined text-sm">edit</span></button>
            </div>
            <h2 id="live-wallet-balance" class="big-number text-white mb-8">₹0.00</h2>
            
            <div class="space-y-4 pt-6 border-t border-white/5">
                <div class="flex justify-between items-end">
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Global Spent</span>
                    <span id="total-spent-percent" class="text-primary font-black text-lg">0%</span>
                </div>
                <div class="h-2 w-full bg-white/5 rounded-full overflow-hidden">
                    <div id="total-spent-fill" class="h-full bg-primary progress-fill shadow-[0_0_15px_#3deb91]" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </section>

    <section class="mb-10">
        <div class="flex justify-between items-center mb-6 px-2">
            <h3 class="text-xs font-black uppercase tracking-[0.2em] text-slate-500">Allocations</h3>
            <button onclick="addNewCategory()" class="text-primary text-[10px] font-black uppercase tracking-widest">+ Add New</button>
        </div>
        <div id="category-list" class="space-y-4">
            </div>
    </section>

    <button onclick="manualReset()" class="w-full py-6 rounded-3xl bg-error-red/10 border border-error-red/20 text-error-red font-black uppercase text-xs tracking-[0.4em] active:scale-95 transition-all flex items-center justify-center gap-3">
        <span class="material-symbols-outlined">restart_alt</span> Reset Protocol
    </button>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] glass-panel rounded-full p-2 flex justify-around items-center z-50">
        <a href="history.html" class="p-3 text-slate-500"><span class="material-symbols-outlined">history</span></a>
        <a href="home.html" class="p-3 text-primary"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">home</span></a>
        <a href="savings.html" class="p-3 text-slate-500"><span class="material-symbols-outlined">savings</span></a>
    </nav>

<script>
    function loadAndCheck() {
        const now = new Date();
        const expiryStr = localStorage.getItem('finnexus_cycle_end');
        
        // AUTO-RESET LOGIC
        if (expiryStr && now > new Date(expiryStr)) {
            performMonthEndSweep();
        }

        renderUI();
    }

    function renderUI() {
        const walletData = JSON.parse(localStorage.getItem('finnexus_wallet_data')) || { categories: [] };
        const balance = parseFloat(localStorage.getItem('finnexus_balance') || 0);
        const list = document.getElementById('category-list');
        
        document.getElementById('live-wallet-balance').textContent = `₹${balance.toLocaleString('en-IN')}`;
        
        // Cycle Countdown
        const end = new Date(localStorage.getItem('finnexus_cycle_end'));
        const diff = Math.ceil((end - new Date()) / (1000 * 60 * 60 * 24));
        document.getElementById('days-left').textContent = `${diff} Days until Sweep`;

        list.innerHTML = '';
        let totalLimit = 0;
        let totalSpent = 0;

        walletData.categories.forEach((cat, index) => {
            const spent = parseFloat(localStorage.getItem(`budget_${cat.name.toLowerCase()}_spent`) || 0);
            const limit = parseFloat(cat.limit) || 0;
            totalLimit += limit;
            totalSpent += spent;

            list.innerHTML += `
                <div class="glass-panel p-6 rounded-[32px] space-y-4">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3">
                            <div class="size-10 rounded-2xl bg-primary/10 flex items-center justify-center text-primary">
                                <span class="material-symbols-outlined">${cat.icon || 'category'}</span>
                            </div>
                            <div>
                                <span class="text-[10px] font-black uppercase text-slate-500 tracking-widest">${cat.name}</span>
                                <p class="text-white font-bold text-xs">₹${limit.toLocaleString()} Limit</p>
                            </div>
                        </div>
                        <button onclick="editCategory(${index})" class="size-8 rounded-full bg-white/5 flex items-center justify-center text-primary active:scale-75 transition-all">
                            <span class="material-symbols-outlined text-sm">edit</span>
                        </button>
                    </div>
                    <div class="flex justify-between items-baseline">
                        <p class="text-[10px] font-black text-slate-500 uppercase">Spent This Month</p>
                        <h4 class="text-3xl font-black ${spent > limit ? 'text-error-red' : 'text-white'}">₹${spent.toLocaleString()}</h4>
                    </div>
                </div>`;
        });

        // Update Header Progress
        const percent = totalLimit > 0 ? Math.min(100, (totalSpent / totalLimit) * 100) : 0;
        document.getElementById('total-spent-percent').textContent = `${percent.toFixed(0)}%`;
        document.getElementById('total-spent-fill').style.width = `${percent}%`;
        if (percent > 90) document.getElementById('total-spent-fill').classList.replace('bg-primary', 'bg-error-red');
    }

    function editCategory(index) {
        const walletData = JSON.parse(localStorage.getItem('finnexus_wallet_data'));
        const newLimit = prompt(`Enter new limit for ${walletData.categories[index].name}:`, walletData.categories[index].limit);
        if (newLimit !== null) {
            walletData.categories[index].limit = parseFloat(newLimit);
            localStorage.setItem('finnexus_wallet_data', JSON.stringify(walletData));
            renderUI();
        }
    }

    function editMainBalance() {
        const current = localStorage.getItem('finnexus_balance');
        const newVal = prompt("Set total available balance:", current);
        if (newVal !== null) {
            localStorage.setItem('finnexus_balance', parseFloat(newVal).toFixed(2));
            renderUI();
        }
    }

    function manualReset() {
        if (confirm("Reset current cycle and sweep surpluses to Savings?")) {
            performMonthEndSweep();
        }
    }

    function performMonthEndSweep() {
        const walletData = JSON.parse(localStorage.getItem('finnexus_wallet_data')) || { categories: [] };
        
        walletData.categories.forEach(cat => {
            const spent = parseFloat(localStorage.getItem(`budget_${cat.name.toLowerCase()}_spent`) || 0);
            const limit = parseFloat(cat.limit) || 0;
            const surplus = Math.max(0, limit - spent);

            // Add surplus to Cumulative Savings
            const currentSavings = parseFloat(localStorage.getItem(`budget_${cat.name.toLowerCase()}_cumulative_saved`) || 0);
            localStorage.setItem(`budget_${cat.name.toLowerCase()}_cumulative_saved`, (currentSavings + surplus).toFixed(2));

            // Reset spending for new month
            localStorage.setItem(`budget_${cat.name.toLowerCase()}_spent`, "0");
        });

        // Set New 30-Day Dates
        const start = new Date();
        const end = new Date();
        end.setDate(start.getDate() + 30);
        localStorage.setItem('finnexus_cycle_start', start.toISOString());
        localStorage.setItem('finnexus_cycle_end', end.toISOString());

        alert("Cycle Refreshed. Leftovers have been moved to the Savings Vault.");
        renderUI();
    }

    function addNewCategory() {
        const name = prompt("Category Name:");
        const limit = prompt("Monthly Limit:");
        if (name && limit) {
            const walletData = JSON.parse(localStorage.getItem('finnexus_wallet_data')) || { categories: [] };
            walletData.categories.push({ name, limit: parseFloat(limit), icon: 'bolt' });
            localStorage.setItem('finnexus_wallet_data', JSON.stringify(walletData));
            renderUI();
        }
    }

    document.addEventListener('DOMContentLoaded', loadAndCheck);
</script>
</body>
</html>
