<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus | Wallet Control</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { 
                        "primary": "#3deb91", 
                        "background-dark": "#0D0D0D", 
                        "error-red": "#ff4d4d", 
                        "warning-orange": "#FF8C42" 
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        .aurora-glow { background: radial-gradient(circle at 50% 0%, rgba(61, 235, 145, 0.1) 0%, transparent 70%); background-color: #0D0D0D; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .big-number { font-size: 2.5rem; line-height: 1; letter-spacing: -0.05em; font-weight: 900; }
        body { min-height: 100dvh; color: white; overflow-x: hidden; }
        .status-badge { font-size: 8px; font-weight: 900; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body class="aurora-glow font-display p-6 pb-40">

    <header class="flex items-center justify-between mb-8">
        <button onclick="window.location.href='home.html'" class="size-12 flex items-center justify-center rounded-2xl bg-white/5 border border-white/10 active:scale-75 transition-transform">
            <span class="material-symbols-outlined text-white">arrow_back</span>
        </button>
        <div class="text-right">
            <h1 class="text-[10px] font-black uppercase tracking-[0.4em] text-primary">Protocol Dashboard</h1>
            <p id="top-countdown" class="text-[10px] text-white font-black uppercase tracking-widest mt-0.5 underline decoration-primary">0 Days to Reset</p>
        </div>
    </header>

    <section class="mb-10">
        <div class="glass-panel rounded-[40px] p-8 relative overflow-hidden">
            <div class="flex justify-between items-start mb-2">
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Available Capital</p>
                <button onclick="editMainBalance()" class="text-primary active:scale-90 transition-transform"><span class="material-symbols-outlined text-sm">edit</span></button>
            </div>
            <h2 id="live-wallet-balance" class="big-number text-white mb-6">₹0.00</h2>
            
            <div class="pt-6 border-t border-white/5">
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500 mb-1">Monthly Budget Allocation</p>
                <div class="flex justify-between items-baseline">
                    <h3 id="total-monthly-budget" class="text-2xl font-black text-[#3deb91]">₹0.00</h3>
                    <p id="mid-countdown" class="text-[9px] font-bold text-slate-400 uppercase">Ends in 0 Days</p>
                </div>
            </div>
        </div>
    </section>

    <div class="px-2 mb-4 flex items-center justify-between">
        <h3 class="text-xs font-black uppercase tracking-[0.2em] text-slate-500">Allocations</h3>
        <div class="flex items-center gap-2 bg-white/5 px-3 py-1 rounded-full border border-white/5">
            <span class="material-symbols-outlined text-[12px] text-primary">timer</span>
            <span id="list-countdown" class="text-[9px] font-black text-white uppercase tracking-tighter">0 Days Left</span>
        </div>
    </div>

    <section class="mb-10">
        <div id="category-list" class="space-y-4">
            </div>
        <button onclick="addNewCategory()" class="w-full mt-4 py-3 border border-dashed border-white/10 rounded-3xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-primary transition-colors">+ Create New Segment</button>
    </section>

    <button onclick="manualReset()" class="w-full py-6 rounded-3xl bg-error-red/10 border border-error-red/20 text-error-red font-black uppercase text-xs tracking-[0.4em] active:scale-95 transition-all flex items-center justify-center gap-3">
        <span class="material-symbols-outlined">restart_alt</span> Reset Protocol
    </button>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] glass-panel rounded-full p-2 flex justify-around items-center z-50">
        <a href="history.html" class="p-3 text-slate-500"><span class="material-symbols-outlined">history</span></a>
        <a href="home.html" class="p-3 text-primary"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">home</span></a>
        <a href="savings.html" class="p-3 text-slate-500"><span class="material-symbols-outlined">savings</span></a>
    </nav>

<script>
    function loadAndCheck() {
        const expiryStr = localStorage.getItem('finnexus_cycle_end');
        // Initial setup for cycle if it doesn't exist
        if (!expiryStr) {
            const start = new Date();
            const end = new Date();
            end.setDate(start.getDate() + 30);
            localStorage.setItem('finnexus_cycle_start', start.toISOString());
            localStorage.setItem('finnexus_cycle_end', end.toISOString());
        } else if (new Date() > new Date(expiryStr)) {
            performMonthEndSweep();
        }
        renderUI();
    }

    function renderUI() {
        const walletData = JSON.parse(localStorage.getItem('finnexus_wallet_data')) || { categories: [] };
        const balance = parseFloat(localStorage.getItem('finnexus_balance') || 0);
        const list = document.getElementById('category-list');
        
        document.getElementById('live-wallet-balance').textContent = `₹${balance.toLocaleString('en-IN')}`;
        
        // Timer Logic
        const end = new Date(localStorage.getItem('finnexus_cycle_end'));
        const diff = Math.max(0, Math.ceil((end - new Date()) / (1000 * 60 * 60 * 24)));
        const timerText = `${diff} Days to Reset`;
        document.getElementById('top-countdown').textContent = timerText;
        document.getElementById('mid-countdown').textContent = `Ends in ${diff} Days`;
        document.getElementById('list-countdown').textContent = `${diff} Days Left`;

        list.innerHTML = '';
        let totalMonthlyBudget = 0;

        walletData.categories.forEach((cat, index) => {
            const spent = parseFloat(localStorage.getItem(`budget_${cat.name.toLowerCase()}_spent`) || 0);
            const limit = parseFloat(cat.limit) || 0;
            totalMonthlyBudget += limit;

            const percent = limit > 0 ? (spent / limit) * 100 : 0;
            let amountColor = 'text-primary'; 
            let statusText = 'Healthy';
            let statusBg = 'bg-primary/20';

            if (percent >= 90) {
                amountColor = 'text-error-red';
                statusText = 'Critical';
                statusBg = 'bg-error-red/20';
            } else if (percent >= 75) {
                amountColor = 'text-warning-orange';
                statusText = 'Warning';
                statusBg = 'bg-warning-orange/20';
            }

            list.innerHTML += `
                <div class="glass-panel p-6 rounded-[32px] space-y-4 relative">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3">
                            <div class="size-10 rounded-2xl bg-white/5 flex items-center justify-center text-primary">
                                <span class="material-symbols-outlined">${cat.icon || 'category'}</span>
                            </div>
                            <div>
                                <span class="text-[10px] font-black uppercase text-slate-500 tracking-widest">${cat.name}</span>
                                <p class="text-white font-black text-sm">₹${limit.toLocaleString()} LIMIT</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editCategory(${index})" class="size-8 rounded-full bg-white/5 flex items-center justify-center text-primary active:scale-75 transition-all">
                                <span class="material-symbols-outlined text-sm">edit</span>
                            </button>
                            <button onclick="deleteCategory(${index})" class="size-8 rounded-full bg-white/5 flex items-center justify-center text-error-red active:scale-75 transition-all">
                                <span class="material-symbols-outlined text-sm">delete</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-end">
                        <div class="space-y-1">
                            <p class="text-[10px] font-black text-slate-500 uppercase">Spent</p>
                            <h4 class="text-3xl font-black ${amountColor}">₹${spent.toLocaleString()}</h4>
                        </div>
                        <div class="text-right flex flex-col items-end gap-2">
                            <span class="status-badge ${statusBg} ${amountColor}">${statusText}</span>
                            <span class="text-[8px] font-black text-slate-500 uppercase tracking-tighter">${diff} Days Left</span>
                        </div>
                    </div>
                </div>`;
        });

        document.getElementById('total-monthly-budget').textContent = `₹${totalMonthlyBudget.toLocaleString('en-IN')}`;
    }

    function editCategory(index) {
        const walletData = JSON.parse(localStorage.getItem('finnexus_wallet_data'));
        const newLimit = prompt(`New limit for ${walletData.categories[index].name}:`, walletData.categories[index].limit);
        if (newLimit !== null) {
            walletData.categories[index].limit = parseFloat(newLimit);
            // RESET Logic: When limit changes, spent resets to 0
            localStorage.setItem(`budget_${walletData.categories[index].name.toLowerCase()}_spent`, "0");
            localStorage.setItem('finnexus_wallet_data', JSON.stringify(walletData));
            renderUI();
        }
    }

    function deleteCategory(index) {
        if(confirm("Delete this category? All spending data for it will be removed.")) {
            const walletData = JSON.parse(localStorage.getItem('finnexus_wallet_data'));
            const catName = walletData.categories[index].name.toLowerCase();
            walletData.categories.splice(index, 1);
            localStorage.removeItem(`budget_${catName}_spent`);
            localStorage.setItem('finnexus_wallet_data', JSON.stringify(walletData));
            renderUI();
        }
    }

    function editMainBalance() {
        const current = localStorage.getItem('finnexus_balance');
        const newVal = prompt("Set total available balance:", current);
        if (newVal !== null) {
            localStorage.setItem('finnexus_balance', parseFloat(newVal).toFixed(2));
            renderUI();
        }
    }

    function manualReset() {
        if (confirm("Reset current cycle? All budget surpluses will move to Savings.")) performMonthEndSweep();
    }

    function performMonthEndSweep() {
        const walletData = JSON.parse(localStorage.getItem('finnexus_wallet_data')) || { categories: [] };
        walletData.categories.forEach(cat => {
            const spent = parseFloat(localStorage.getItem(`budget_${cat.name.toLowerCase()}_spent`) || 0);
            const limit = parseFloat(cat.limit) || 0;
            const surplus = Math.max(0, limit - spent);
            const currentSavings = parseFloat(localStorage.getItem(`budget_${cat.name.toLowerCase()}_cumulative_saved`) || 0);
            localStorage.setItem(`budget_${cat.name.toLowerCase()}_cumulative_saved`, (currentSavings + surplus).toFixed(2));
            localStorage.setItem(`budget_${cat.name.toLowerCase()}_spent`, "0");
        });
        const start = new Date();
        const end = new Date();
        end.setDate(start.getDate() + 30);
        localStorage.setItem('finnexus_cycle_start', start.toISOString());
        localStorage.setItem('finnexus_cycle_end', end.toISOString());
        renderUI();
    }

    function addNewCategory() {
        const name = prompt("Category Name:");
        const limit = prompt("Monthly Limit:");
        if (name && limit) {
            const walletData = JSON.parse(localStorage.getItem('finnexus_wallet_data')) || { categories: [] };
            walletData.categories.push({ name, limit: parseFloat(limit), icon: 'segment' });
            localStorage.setItem(`budget_${name.toLowerCase()}_spent`, "0");
            localStorage.setItem('finnexus_wallet_data', JSON.stringify(walletData));
            renderUI();
        }
    }

    document.addEventListener('DOMContentLoaded', loadAndCheck);
</script>
</body>
</html>
