<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus Wallet Controller</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6ee591",
                        "secondary-fixed": "#00fbfb",
                        "background": "#131313",
                        "surface-container-lowest": "#0e0e0e",
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .aurora-blur { filter: blur(120px); z-index: -1; }
        .glass-panel { background: rgba(53, 53, 52, 0.4); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
        body { min-height: max(884px, 100dvh); }
    </style>
</head>
<body class="bg-surface-container-lowest text-slate-100 font-body min-h-screen pb-32">
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-[#6ee591]/20 rounded-full aurora-blur"></div>
        <div class="absolute top-1/2 -right-24 w-[500px] h-[500px] bg-[#00fbfb]/10 rounded-full aurora-blur"></div>
    </div>

    <header class="fixed top-0 w-full z-50 bg-[#131313]/80 backdrop-blur-xl border-b border-white/5">
        <div class="flex justify-between items-center px-6 py-4">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-headline font-extrabold tracking-tighter text-primary">FinNexus</h1>
            </div>
            <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1">security</span>
        </div>
    </header>

    <main class="pt-24 px-6 max-w-4xl mx-auto space-y-10">
        <section class="space-y-6">
            <div class="glass-panel rounded-3xl p-8 border border-white/5 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10">
                    <span class="material-symbols-outlined text-9xl">account_balance_wallet</span>
                </div>
                <div class="relative z-10">
                    <label class="text-[10px] uppercase tracking-[0.15em] text-slate-400 mb-2 block">Set Available Balance</label>
                    <div class="flex gap-2 items-center">
                        <span class="text-3xl font-bold text-primary">₹</span>
                        <input id="main-balance" class="bg-transparent border-none p-0 text-5xl font-extrabold tracking-tight text-white focus:ring-0 w-full" type="number" placeholder="0"/>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-start md:items-center p-2">
                <div>
                    <h2 class="text-[11px] uppercase tracking-[0.2em] text-slate-500">Total Planned Monthly Budget</h2>
                    <p class="text-4xl font-headline font-bold text-secondary-fixed mt-1 tracking-tight">₹<span id="total-budget-display">0</span></p>
                </div>
                <div class="mt-4 flex items-center gap-2 px-4 py-2 bg-white/5 rounded-full border border-white/5">
                    <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                    <span class="text-[10px] font-bold tracking-widest uppercase">Safe Mode Active</span>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6" id="category-grid">
            </section>

        <section class="pb-10">
            <button id="add-category-btn" class="w-full h-32 rounded-3xl border-2 border-dashed border-primary/30 glass-panel flex flex-col items-center justify-center gap-2 group hover:border-primary hover:bg-primary/5 transition-all">
                <div class="w-12 h-12 rounded-full bg-primary/20 flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-3xl font-bold">add</span>
                </div>
                <span class="font-bold tracking-widest text-sm uppercase text-primary">ADD NEW CATEGORY</span>
            </button>
        </section>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md rounded-[2rem] border border-white/10 bg-[#1c1b1b]/80 backdrop-blur-2xl z-50 flex justify-around items-center px-2 py-2">
        <a href="history.html" class="flex items-center justify-center text-slate-400 p-4 active:scale-90"><span class="material-symbols-outlined text-2xl">history</span></a>
        <a href="home.html" class="flex items-center justify-center text-slate-400 p-4 active:scale-90"><span class="material-symbols-outlined text-2xl">home</span></a>
        <a href="savings.html" class="flex items-center justify-center bg-primary/20 text-primary rounded-full p-4 active:scale-90"><span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">account_balance_wallet</span></a>
    </nav>

    <script>
        // --- DATA PERSISTENCE ENGINE ---
        const STORAGE_KEY = 'finnexus_wallet_data';
        
        // Initial Default Data
        let walletData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            availableBalance: 84500,
            categories: [
                { id: 1, name: 'Food', limit: 4500, icon: 'restaurant' },
                { id: 2, name: 'Fuel', limit: 2000, icon: 'local_gas_station' },
                { id: 3, name: 'Commute', limit: 1500, icon: 'directions_subway' },
                { id: 4, name: 'Rent', limit: 35000, icon: 'home_work' }
            ]
        };

        const renderCategories = () => {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';
            let total = 0;

            walletData.categories.forEach(cat => {
                total += parseFloat(cat.limit);
                const card = `
                    <div class="glass-panel rounded-3xl p-6 border border-white/5 space-y-6 flex flex-col justify-between group hover:border-primary/30 transition-all">
                        <div class="flex justify-between items-start">
                            <div class="p-3 rounded-2xl bg-white/5 text-primary">
                                <span class="material-symbols-outlined text-2xl">${cat.icon}</span>
                            </div>
                            <button class="text-slate-500 hover:text-white" onclick="editCategory(${cat.id})">
                                <span class="material-symbols-outlined text-xl">edit</span>
                            </button>
                        </div>
                        <div>
                            <h3 class="font-headline font-bold text-xl text-white mb-1">${cat.name}</h3>
                            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-medium">Monthly Limit</p>
                            <div class="flex items-baseline gap-1 mt-1">
                                <span class="text-xl font-bold text-secondary-fixed">₹</span>
                                <input class="bg-transparent border-none p-0 text-2xl font-bold text-white focus:ring-0 w-full" 
                                       type="number" value="${cat.limit}" onchange="updateLimit(${cat.id}, this.value)"/>
                            </div>
                        </div>
                    </div>`;
                grid.insertAdjacentHTML('beforeend', card);
            });

            document.getElementById('total-budget-display').innerText = total.toLocaleString();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(walletData));
            // Sync with global balance for Home page
            localStorage.setItem('finnexus_balance', walletData.availableBalance);
        };

        // --- ACTIONS ---
        const updateLimit = (id, newVal) => {
            const cat = walletData.categories.find(c => c.id === id);
            if (cat) cat.limit = parseFloat(newVal) || 0;
            renderCategories();
        };

        document.getElementById('main-balance').addEventListener('input', (e) => {
            walletData.availableBalance = parseFloat(e.target.value) || 0;
            renderCategories();
        });

        document.getElementById('add-category-btn').addEventListener('click', () => {
            const name = prompt("Enter Category Name (e.g. Shopping):");
            if (name) {
                walletData.categories.push({
                    id: Date.now(),
                    name: name,
                    limit: 0,
                    icon: 'category'
                });
                renderCategories();
            }
        });

        // Initialize
        document.getElementById('main-balance').value = walletData.availableBalance;
        renderCategories();
    </script>
</body>
</html>
