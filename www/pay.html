<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FinNexus - Pay Now</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3deb91",
                        "background-dark": "#0D0D0D",
                        "cyan-accent": "#00f2ff",
                        "error-red": "#ff4d4d"
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        .aurora-glow {
            background: radial-gradient(circle at 0% 0%, rgba(61, 235, 145, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.1) 0%, transparent 50%);
        }
        .glass-panel { background: rgba(15, 15, 15, 0.98); backdrop-filter: blur(40px); border-top: 1px solid rgba(255, 255, 255, 0.08); }
        
        /* High-Intensity Scanner Animation */
        .scanner-line {
            height: 3px;
            background: linear-gradient(90deg, transparent, #00f2ff, transparent);
            box-shadow: 0 0 20px #00f2ff;
            animation: scan 2.5s ease-in-out infinite;
            position: absolute; width: 100%; z-index: 20;
        }
        @keyframes scan { 0%, 100% { top: 5%; opacity: 0.2; } 50% { top: 95%; opacity: 1; } }
        
        .cyber-bracket { border-color: #00f2ff; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        
        .hero-button-3d {
            background: linear-gradient(180deg, #3deb91 0%, #1a9e66 100%);
            box-shadow: 0 10px 25px -5px rgba(61, 235, 145, 0.4);
        }
        
        .cursor-blink { animation: blink 1s step-end infinite; border-right: 3px solid #3deb91; }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #3deb91 } }
        
        #reader { width: 100%; height: 100%; background: #000; border-radius: 24px; overflow: hidden; }
        #reader video { object-fit: cover !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { background-color: #0D0D0D; min-height: 100dvh; overflow-x: hidden; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 antialiased aurora-glow">

<div class="relative flex h-screen w-full flex-col">
    <header class="absolute top-0 left-0 right-0 z-50 flex items-center justify-between p-6">
        <button onclick="window.location.href='home.html'" class="size-10 flex items-center justify-center rounded-full bg-black/40 border border-white/10 backdrop-blur-md active:scale-75 transition-transform">
            <span class="material-symbols-outlined text-white text-xl">arrow_back</span>
        </button>
        <div class="flex flex-col items-center">
            <span class="text-[9px] font-black tracking-[0.4em] uppercase text-primary italic">FinNexus Live Cam</span>
            <div id="status-dot" class="flex items-center gap-1.5 mt-1">
                <span class="size-1.5 bg-primary rounded-full animate-pulse"></span>
                <span class="text-[8px] font-bold text-slate-400 uppercase">System Ready</span>
            </div>
        </div>
        <button onclick="toggleFlash()" class="size-10 flex items-center justify-center rounded-full bg-black/40 border border-white/10 backdrop-blur-md active:scale-75">
            <span class="material-symbols-outlined text-white text-xl">flashlight_on</span>
        </button>
    </header>

    <main class="relative flex-1 flex flex-col items-center justify-center pt-10">
        <div class="relative w-72 h-72 mb-10">
            <div id="reader" class="relative z-0 border border-white/10"></div>
            
            <div class="absolute inset-0 z-10 pointer-events-none">
                <div class="scanner-line"></div>
                <div class="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 cyber-bracket rounded-tl-3xl"></div>
                <div class="absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 cyber-bracket rounded-tr-3xl"></div>
                <div class="absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 cyber-bracket rounded-bl-3xl"></div>
                <div class="absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 cyber-bracket rounded-br-3xl"></div>
            </div>
        </div>

        <div class="w-full px-10 space-y-3 max-w-sm">
            <div class="relative group">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-lg group-focus-within:text-primary">alternate_email</span>
                <input type="text" id="manual-upi" placeholder="UPI ID or Phone" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-sm focus:border-primary focus:ring-0 outline-none transition-all" oninput="validateOnEntry(this.value)">
            </div>
        </div>
    </main>

    <div class="glass-panel relative z-40 rounded-t-[40px] px-6 pt-2 pb-10 shadow-2xl transition-all duration-500" id="payment-panel">
        <div class="w-12 h-1 bg-white/10 rounded-full mx-auto my-4"></div>
        
        <div class="text-center mb-6">
            <h2 id="display-merchant-name" class="text-xl font-black text-slate-100 tracking-tight uppercase">Scanning Nodes...</h2>
            <p id="display-merchant-id" class="text-slate-500 text-[10px] font-mono tracking-widest mt-1 italic">POSITION QR IN BRACKETS</p>
        </div>

        <div class="relative mb-8 text-center" onclick="document.getElementById('real-input').focus()">
            <div class="flex items-center justify-center gap-1">
                <span class="text-3xl font-black text-primary/40 self-end mb-2">₹</span>
                <div class="flex flex-col items-center relative">
                    <input type="number" id="real-input" class="absolute inset-0 opacity-0 cursor-default" oninput="updateVisualAmount(this.value)">
                    <div id="visual-amount" class="text-6xl font-black text-white tracking-tighter min-h-[72px] flex items-center">
                        <span class="cursor-blink h-12"></span>
                    </div>
                </div>
            </div>
            <p class="text-slate-500 text-[9px] font-black uppercase tracking-[0.4em] mt-2">Volume Allocation</p>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-8 no-scrollbar" id="category-bar"></div>

        <div id="action-wrapper">
            <button id="main-proceed-btn" onclick="handleVerifyAndProceed()" class="hero-button-3d w-full py-5 rounded-2xl flex items-center justify-center gap-3 active:scale-[0.98] transition-transform">
                <span class="material-symbols-outlined text-white font-bold">shield</span>
                <span class="text-white text-lg font-black tracking-widest uppercase">Verify & Proceed</span>
            </button>
        </div>
    </div>
</div>

<script>
    let selectedCategory = null;
    let activeID = null;
    let scanner = null;

    // 10-ITEM DEMO DATASET (Real vs Scam)
    const REGISTRY = {
        // REAL ENTITIES
        "merchant.bluetokai@finnexus": { name: "Blue Tokai Coffee", isScam: false },
        "grocery.store@okaxis": { name: "Reliance Fresh", isScam: false },
        "8887776665": { name: "Alexander (Verified Friend)", isScam: false },
        "electricity.bill@okhdfc": { name: "TNEB Official", isScam: false },
        "zomato.pay@okicici": { name: "Zomato Limited", isScam: false },
        
        // SCAM ENTITIES
        "9876543210": { name: "BLOCKLISTED: FRAUDULENT NUMBER", isScam: true },
        "scam.hacker@upi": { name: "SOCIAL ENGINEERING ALERT", isScam: true },
        "win.prize@upi": { name: "LOTTERY SCAM DETECTED", isScam: true },
        "9990001112": { name: "SUSPICIOUS IMPERSONATOR", isScam: true },
        "fake.bank.support@upi": { name: "PHISHING ATTEMPT DETECTED", isScam: true }
    };

    function updateVisualAmount(val) {
        const display = document.getElementById('visual-amount');
        display.innerHTML = val ? val + `<span class="cursor-blink h-12 ml-1"></span>` : `<span class="cursor-blink h-12"></span>`;
    }

    function validateOnEntry(val) {
        if (!val || val.length < 3) return;
        activeID = val;
        const data = REGISTRY[val] || { name: "Unverified Entity", isScam: false };
        
        const nameEl = document.getElementById('display-merchant-name');
        const idEl = document.getElementById('display-merchant-id');
        const btn = document.getElementById('main-proceed-btn');

        nameEl.textContent = data.name;
        idEl.textContent = val;

        if (data.isScam) {
            nameEl.className = "text-xl font-black text-error-red tracking-tight animate-pulse";
            btn.innerHTML = `<span class="material-symbols-outlined">block</span> BLOCKED BY FIREWALL`;
            btn.className = "w-full py-5 rounded-2xl flex items-center justify-center gap-3 bg-red-500/20 border border-red-500/40 text-error-red font-black uppercase";
            btn.onclick = () => window.location.href = 'pages/onboarding/barriers/defender.html';
        } else {
            nameEl.className = "text-xl font-black text-slate-100 tracking-tight uppercase";
            btn.innerHTML = `<span class="material-symbols-outlined">shield</span> VERIFY & PROCEED`;
            btn.className = "hero-button-3d w-full py-5 rounded-2xl flex items-center justify-center gap-3 active:scale-[0.98]";
            btn.onclick = handleVerifyAndProceed;
        }
    }

    // --- CAMERA INTEGRATION ---
    function startScanner() {
        scanner = new Html5Qrcode("reader");
        const config = { fps: 20, qrbox: { width: 250, height: 250 } };
        
        scanner.start({ facingMode: "environment" }, config, (decodedText) => {
            // Success: decodedText is the UPI string or ID
            validateOnEntry(decodedText);
            // Visual feedback
            document.getElementById('status-dot').querySelector('span:last-child').textContent = "Target Locked";
        });
    }

    function toggleFlash() {
        // Flashlight logic usually requires the media stream track
        alert("Flashlight requested: Deploying system override.");
    }

    function selectCat(name, el) {
        selectedCategory = name;
        document.querySelectorAll('.cat-pill').forEach(btn => {
            btn.className = "cat-pill flex-none px-5 py-2.5 rounded-full bg-white/5 border border-white/10 text-slate-500 font-bold uppercase text-[10px]";
        });
        el.className = "cat-pill flex-none px-5 py-2.5 rounded-full bg-primary/20 border border-primary text-primary font-black shadow-[0_0_20px_rgba(61,235,145,0.2)] uppercase text-[10px]";
    }

    function handleVerifyAndProceed() {
    if (!activeID) return alert("Identify Target First");
    const amount = parseFloat(document.getElementById('real-input').value);
    if (!amount || amount <= 0) return alert("Invalid Volume");

    // 1. DATA CALCULATION (Same as before)
    const walletData = JSON.parse(localStorage.getItem('finnexus_wallet_data')) || { categories: [] };
    const catObj = walletData.categories.find(c => c.name.toLowerCase() === selectedCategory.toLowerCase());
    const limit = catObj ? parseFloat(catObj.limit) : 0;
    const spent = parseFloat(localStorage.getItem(`budget_${selectedCategory.toLowerCase()}_spent`) || 0);
    
    let savingsPull = 0;
    if ((spent + amount) > limit) {
        savingsPull = (spent >= limit) ? amount : ((spent + amount) - limit);
    }

    // 2. CONSTRUCT THE REAL UPI DEEP LINK
    // Format: upi://pay?pa=ADDRESS&pn=NAME&am=AMOUNT&cu=INR
    const merchantName = document.getElementById('display-merchant-name').textContent;
    const upiLink = `upi://pay?pa=${activeID}&pn=${encodeURIComponent(merchantName)}&am=${amount.toFixed(2)}&cu=INR`;

    // 3. STORE TRANSACTION DATA
    sessionStorage.setItem('pending_payment', JSON.stringify({
        amount: amount.toFixed(2),
        category: selectedCategory,
        merchantName: merchantName,
        merchantID: activeID,
        overage: savingsPull.toFixed(2),
        deepLink: upiLink // We store it to trigger after the budget barrier
    }));

    // 4. NAVIGATION
    if (savingsPull > 0) {
        // If over budget, go to Barrier first
        window.location.href = 'pages/onboarding/barriers/budget.html';
    } else {
        // If within budget, trigger the UPI app immediately
        triggerUPI(upiLink);
    }
}

function triggerUPI(link) {
    // This opens GPay/PhonePe/etc.
    window.location.href = link;
    
    // IMPORTANT: Because browsers cannot "know" if a bank transfer succeeded 
    // inside another app, we wait for you to return to FinNexus.
    // We redirect to success.html so you can log it when you get back.
    setTimeout(() => {
        window.location.href = 'pages/onboarding/success.html';
    }, 1500); 
}
</script>
</body>
</html>
